
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Duality tracker</title>
    <style>
      :root {
        --bg: #a87444;
        --black: #8f61a8;
        --white: #e01b8e;
        --face-line: #231f20;
        --text-subtle: rgba(73, 45, 23, 0.72);
        --condensed:
          "Futura-CondensedExtraBold", "Futura Condensed", "Avenir Next Condensed",
          "Arial Narrow", "Roboto Condensed", "Impact", sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        min-height: 100svh;
        min-height: 100dvh;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      .app {
        width: min(96vw, 980px);
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: clamp(12px, 2.2vh, 24px);
        padding: calc(10px + env(safe-area-inset-top)) 0 calc(6px + env(safe-area-inset-bottom));
        box-sizing: border-box;
      }

      .instruction {
        margin: 0;
        max-width: 68ch;
        text-align: center;
        font-size: clamp(13px, 1.33vw, 14px);
        line-height: 1.3;
        letter-spacing: 0.01em;
        color: rgba(73, 45, 23, 0.56);
      }

      .symbol-stage {
        width: min(88vw, 74vh, 760px);
        height: min(88vw, 74vh, 760px);
        position: relative;
        margin-top: auto;
      }

      .wrap {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      .date-stamp {
        position: absolute;
        z-index: 2;
        font-family: var(--condensed);
        font-size: clamp(14px, 2.8vmin, 30px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.028em;
        text-transform: uppercase;
        user-select: none;
        pointer-events: none;
        display: none;
      }

      .date-top {
        top: -3.6%;
        right: -2.8%;
        color: var(--white);
      }

      .date-bottom {
        bottom: -3.6%;
        left: -2.8%;
        transform: rotate(180deg);
        transform-origin: center;
        color: var(--black);
      }

      .meta {
        width: min(94vw, 760px);
        display: grid;
        justify-items: center;
        gap: 5px;
        margin-top: 0;
        margin-bottom: 2px;
      }

      .balance-meter {
        width: min(26vw, 210px);
        display: grid;
        justify-items: center;
        gap: 4px;
        margin-top: 0;
      }

      .balance-track {
        width: 100%;
        height: clamp(8px, 1.05vmin, 11px);
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.92);
        overflow: hidden;
        display: flex;
        background: rgba(0, 0, 0, 0.12);
        position: relative;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.14) inset;
        touch-action: none;
        user-select: none;
        cursor: ew-resize;
      }

      .balance-fill {
        height: 100%;
        flex: 0 0 auto;
        transition: width 90ms linear;
      }

      .balance-fill-negative {
        background: #000;
      }

      .balance-fill-positive {
        background: #fff;
      }

      .balance-handle {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 0;
        border-left: 1px solid rgba(0, 0, 0, 0.86);
        pointer-events: none;
      }

      .balance-label-row {
        width: 100%;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        font-weight: 700;
        font-size: clamp(11px, 1.2vmin, 18px);
        line-height: 1;
      }

      .balance-label-negative {
        color: rgba(0, 0, 0, 0.96);
      }

      .balance-label-positive {
        color: rgba(0, 0, 0, 0.96);
      }

      .instruction-row {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: clamp(13px, 1.33vw, 14px);
        margin-top: 0;
      }

      .instruction-row .instruction {
        max-width: 68ch;
        white-space: normal;
      }

      .button-row {
        display: grid;
        place-items: center;
        width: 100%;
      }

      .shot-btn {
        border: 1px solid rgba(73, 45, 23, 0.34);
        background: transparent;
        color: rgba(73, 45, 23, 0.44);
        border-radius: 999px;
        padding: 3px 10px;
        font-family: inherit;
        font-size: clamp(10px, 1.02vw, 11px);
        font-weight: 400;
        letter-spacing: 0.01em;
        line-height: 1.2;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        transition: background-color 120ms ease, color 120ms ease, border-color 120ms ease;
      }

      .shot-btn:hover {
        background: rgba(73, 45, 23, 0.08);
      }

      .shot-btn:active {
        background: rgba(73, 45, 23, 0.12);
      }

      .shot-btn.is-saving {
        opacity: 0.75;
      }

      .shot-btn:focus-visible {
        outline: 2px solid rgba(17, 17, 17, 0.4);
        outline-offset: 2px;
      }

      .save-status {
        min-height: 1em;
        margin: 0;
        font-size: clamp(9px, 0.92vw, 10px);
        color: rgba(73, 45, 23, 0.38);
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      @media (max-width: 760px) {
        .app {
          position: relative;
          gap: 10px;
          justify-content: center;
          padding-top: calc(8px + env(safe-area-inset-top));
          padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .symbol-stage {
          width: min(94vw, 70vh, 620px);
          height: min(94vw, 70vh, 620px);
          margin-top: 0;
        }

        .meta {
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          bottom: calc(6px + env(safe-area-inset-bottom));
          width: min(98vw, 680px);
          gap: 4px;
          margin: 0;
        }

        .balance-meter {
          width: min(36vw, 180px);
          gap: 4px;
          margin-top: 0;
        }

        .balance-track {
          height: clamp(7px, 2.1vmin, 10px);
        }

        .balance-label-row {
          font-size: clamp(9px, 2.6vmin, 13px);
        }

        .instruction {
          font-size: clamp(10px, 2.9vw, 13px);
          color: rgba(73, 45, 23, 0.86);
          white-space: nowrap;
        }

        .instruction-row .instruction {
          max-width: 98vw;
        }

        .shot-btn {
          font-size: clamp(8px, 2.45vw, 11px);
          color: rgba(73, 45, 23, 0.74);
          border-color: rgba(73, 45, 23, 0.58);
          padding: 3px 11px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="symbol-stage" aria-label="Duality symbol with date">
        <div class="date-stamp date-top" id="dateTop"></div>
        <section class="wrap">
          <canvas id="yy" aria-label="Interactive dual-face mood tracker"></canvas>
        </section>
        <div class="date-stamp date-bottom" id="dateBottom"></div>
      </section>

      <section class="balance-meter" aria-label="Positivity and negativity balance">
        <div
          class="balance-track"
          id="balanceTrack"
          role="slider"
          aria-label="Positivity ratio"
          aria-valuemin="2"
          aria-valuemax="98"
          aria-valuenow="50"
          tabindex="0"
        >
          <div class="balance-fill balance-fill-negative" id="balanceNegativeFill"></div>
          <div class="balance-fill balance-fill-positive" id="balancePositiveFill"></div>
          <div class="balance-handle" id="balanceHandle"></div>
        </div>
        <div class="balance-label-row">
          <span class="balance-label-negative" id="balanceNegativeLabel">negativity 50%</span>
          <span class="balance-label-positive" id="balancePositiveLabel">positivity 50%</span>
        </div>
      </section>

      <section class="meta">
        <p class="instruction">drag and manipulate the faces to express your current mood</p>
        <p class="instruction">notice the balance of light and dark within you today</p>
        <div class="instruction-row">
          <p class="instruction">take a screenshot to capture this timestamped self portrait</p>
        </div>
        <div class="button-row">
          <button class="shot-btn" id="saveShot" type="button">screenshot</button>
        </div>
        <p class="save-status" id="saveStatus" aria-live="polite"></p>
      </section>
    </main>

    <script>
      (() => {
        const TAU = Math.PI * 2;
        const canvas = document.getElementById("yy");
        const dateTop = document.getElementById("dateTop");
        const dateBottom = document.getElementById("dateBottom");
        const saveShotButton = document.getElementById("saveShot");
        const saveStatus = document.getElementById("saveStatus");
        const balanceTrack = document.getElementById("balanceTrack");
        const balanceNegativeFill = document.getElementById("balanceNegativeFill");
        const balancePositiveFill = document.getElementById("balancePositiveFill");
        const balanceHandle = document.getElementById("balanceHandle");
        const balanceNegativeLabel = document.getElementById("balanceNegativeLabel");
        const balancePositiveLabel = document.getElementById("balancePositiveLabel");
        const ctx = canvas.getContext("2d", { alpha: true });
        const rootStyles = getComputedStyle(document.documentElement);

        const COLORS = {
          bg: rootStyles.getPropertyValue("--bg").trim() || "#a87444",
          black: rootStyles.getPropertyValue("--black").trim() || "#8f61a8",
          white: rootStyles.getPropertyValue("--white").trim() || "#e01b8e",
          line: rootStyles.getPropertyValue("--face-line").trim() || "#231f20",
        };
        const LOOK_TEST = Object.freeze({
          // Quick revert: set enabled to false.
          enabled: true,
          // Temporary look test palette and stroke visibility.
          colors: {
            black: "#64418e",
            white: "#ff6699",
          },
          drawDividerStroke: true,
          drawOuterStroke: true,
          drawEyeStroke: true,
        });
        if (LOOK_TEST.enabled) {
          COLORS.black = LOOK_TEST.colors.black;
          COLORS.white = LOOK_TEST.colors.white;
        }

        const CONDENSED_FONT_STACK =
          '"Futura-CondensedExtraBold","Futura Condensed","Avenir Next Condensed","Arial Narrow","Roboto Condensed","Impact",sans-serif';

        const isIOSLike =
          /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        // Same core interaction fields as the yin-yang version.
        const PUSH_MIN = 0.02;
        const PUSH_MAX = 0.98;
        const EYE_HIDE_AREA_THRESHOLD = 0.1;
        const FACE_EDGE_PADDING_CSS = 20;
        const FEATURE_PADDING_CSS = 8;
        const EYE_DRAG_HIT_PAD_CSS = 8;
        const OUTLINE_WIDTH_CSS = 2.2;
        const OUTER_RING_WEIGHT = 1.2;

        // Fallback divider profile (rest pose). Primary source is face_ref.svg.
        const BASE_PROFILE = Object.freeze([
          [-0.94, 0.0],
          [-0.8617, 0.0],
          [-0.7833, 0.0],
          [-0.705, 0.0],
          [-0.6267, 0.0],
          [-0.5483, 0.006],
          [-0.47, 0.1609],
          [-0.3917, 0.3502],
          [-0.3133, 0.3728],
          [-0.235, 0.3534],
          [-0.1567, 0.3094],
          [-0.0783, 0.1928],
          [0.0, 0.0179],
          [0.0783, -0.148],
          [0.1567, -0.3143],
          [0.235, -0.3485],
          [0.3133, -0.3079],
          [0.3917, -0.2029],
          [0.47, -0.0526],
          [0.5483, -0.0047],
          [0.6267, 0.0],
          [0.705, 0.0],
          [0.7833, 0.0],
          [0.8617, 0.0],
          [0.94, 0.0],
        ]);

        const FACE_SVG_VIEWBOX = 540.72;
        const FACE_BASE_LEFT_PATH_D =
          "M266.76,0l-.5,92.1-.15,59.13c26.68-9.61,52.18-17.95,80.25-19.3,9.8-.21,18.98,1.04,27.85,4.71,11.83,4.89,19.52,15.53,20.13,28.41,1.3,27.38-12.11,50.61-33.57,66.62-26.2,17.84-62.76,24.9-94.2,19.39l-.64,40.14-.25,24.05c-36.84,1.7-68.67-2.98-101.56-19.76-6.62-3.38-12.68-6.92-19.03-10.72-2.2-1.32-3.81-3.11-6.51-4.24,4.46,18.29,10.46,35.37,17.92,52.35,5.06,11.51,10.86,22.14,17.69,32.57,4.04,6.16,9.17,10.83,15.63,14.29,20.47,10.97,52.78,19.47,76.06,25.29.59,11.05.25,21.73.31,32.89l.58,102.77h-10.07c.04-.41-.46-.4-.91-.55C119.51,532.87,8.69,424,.91,286.17c.02.3.11-9.28-.91-9.81v-12.95c.5-3.36.75-6.18.9-8.82C8.61,118.15,117.55,9.11,253.7.65c3.33-.21,7.36.22,11.14-.65h1.92Z";
        const FACE_SVG_PATH_D = Object.freeze({
          eyeLeft:
            "M216.67,106.73c-.49-5.25-2.61-9.8-6.15-13.55-4.16-4.39-10.74-4.29-14.78.46-7.86,9.24-7.58,22.99.3,32.23,2.06,2.42,4.64,3.74,7.62,3.69,9.61-.16,13.82-14.1,13.01-22.83Z",
          shared:
            "M322.17,468.78c4.13,3.8,10.22,3.38,13.97-.82,8.55-9.58,8.06-24.72-1.1-33.88-4.28-4.28-11.1-3.18-14.64,1.52-7.08,9.4-7.65,24.52,1.77,33.17Z",
        });

        const saveState = {
          isSaving: false,
          statusTimeout: 0,
        };
        const ORIENTATION_ANGLE = Object.freeze({
          white: 0,
          black: Math.PI,
        });
        const viewRotation = {
          current: 0,
          target: 0,
        };

        const state = {
          whitePush: 0.5,
          blackPush: 0.5,
          whiteLift: 0,
          blackLift: 0,
          whiteLocalShiftX: 0,
          blackLocalShiftX: 0,
          whiteLocalShiftY: 0,
          blackLocalShiftY: 0,
          whiteMouthWidth: 0,
          blackMouthWidth: 0,
          whiteMouthHeight: 0,
          blackMouthHeight: 0,
          whiteFocusY: -0.5,
          blackFocusY: 0.5,
        };

        const stateTarget = { ...state };
        const STATE_KEYS = Object.keys(state);

        const drag = {
          active: false,
          pointerId: null,
          mode: null, // "white" | "black"
          eyeGrab: null, // "top" | "bottom" | null
          start: { x: 0, y: 0 },
          last: { x: 0, y: 0 },
          startWhitePush: 0.5,
          startBlackPush: 0.5,
          startWhiteLift: 0,
          startBlackLift: 0,
          startWhiteLocalShiftX: 0,
          startBlackLocalShiftX: 0,
          startWhiteLocalShiftY: 0,
          startBlackLocalShiftY: 0,
          startWhiteMouthWidth: 0,
          startBlackMouthWidth: 0,
          startWhiteMouthHeight: 0,
          startBlackMouthHeight: 0,
          startWhiteFocusY: -0.5,
          startBlackFocusY: 0.5,
          grabYNorm: 0,
          noseGrab: 0,
          mouthGrab: 0,
          topInfluence: 0.5,
          bottomInfluence: 0.5,
        };
        const balanceDrag = {
          active: false,
          pointerId: null,
          side: "white",
        };
        let balancePositiveRatio = 0.5;

        const EYE_ANCHORS = Object.freeze({
          top: { xNorm: -0.238, yNorm: -0.595, radiusScale: 0.11 },
          bottom: { xNorm: 0.217, yNorm: 0.668, radiusScale: 0.11 },
        });

        const EYE_LOAD_TARGETS = Object.freeze({
          top: { xNorm: -0.238, yNorm: -0.595 },
          bottom: { xNorm: 0.217, yNorm: 0.668 },
        });
        const EYE_LOAD_BLEND_DEFORM = 0.18;
        const FACE_LANDMARKS = Object.freeze({
          upper: {
            tipY: -0.02,
            tipSigma: 0.11,
            baseY: 0.13,
            baseSigma: 0.13,
            baseWeight: 0.8,
          },
          lower: {
            tipY: 0.27,
            tipSigma: 0.11,
            baseY: 0.43,
            baseSigma: 0.14,
            baseWeight: 0.78,
          },
        });
        const FEATURE_ORDER = Object.freeze({
          topEyeMaxNorm: -0.26,
          bottomEyeMinNorm: 0.26,
          noseUpperNorm: -0.08,
          noseLowerNorm: 0.14,
          mouthUpperNorm: 0.16,
          mouthLowerNorm: 0.40,
          minEyeToNoseGapNorm: 0.12,
          minNoseToMouthGapNorm: 0.08,
        });

        const eyeMemory = {
          top: null,
          bottom: null,
        };

        function clamp(n, min, max) {
          return Math.min(max, Math.max(min, n));
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function smoothstep(edge0, edge1, x) {
          if (edge0 === edge1) return x < edge0 ? 0 : 1;
          const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
          return t * t * (3 - 2 * t);
        }

        function gaussian(v, center, sigma) {
          return Math.exp(-Math.pow((v - center) / Math.max(1e-6, sigma), 2));
        }

        function clampPush(v) {
          return clamp(v, PUSH_MIN, PUSH_MAX);
        }

        function setViewRotationForSide(side) {
          const next = ORIENTATION_ANGLE[side] ?? 0;
          viewRotation.target = next;
          viewRotation.current = next;
        }

        function setBalanceFromPositiveRatio(positiveRatio, sideHint) {
          const positive = clampPush(positiveRatio);
          const negative = clampPush(1 - positive);
          stateTarget.whitePush = positive;
          stateTarget.blackPush = negative;
          // Slider should feel direct and deterministic.
          state.whitePush = positive;
          state.blackPush = negative;
          if (sideHint) {
            setViewRotationForSide(sideHint);
          }
        }

        function getPositiveRatioFromGeometry(geometryState) {
          const points = geometryState?.dividerPoints;
          const R = geometryState?.R;
          if (!points || points.length < 2 || !(R > 0)) {
            return clampPush(state.whitePush);
          }

          let whiteAccum = 0;
          let totalAccum = 0;
          for (let i = 0; i < points.length; i += 1) {
            const p = points[i];
            const outerX = Math.sqrt(Math.max(0, R * R - p.y * p.y));
            const dividerX = clamp(p.x, -outerX, outerX);
            const whiteWidth = outerX + dividerX;
            const totalWidth = outerX * 2;
            whiteAccum += whiteWidth;
            totalAccum += totalWidth;
          }

          if (totalAccum <= 1e-6) {
            return clampPush(state.whitePush);
          }
          return clamp(whiteAccum / totalAccum, PUSH_MIN, PUSH_MAX);
        }

        function updateBalanceMeter(geometryState) {
          if (
            !balanceTrack ||
            !balanceNegativeFill ||
            !balancePositiveFill ||
            !balanceHandle ||
            !balanceNegativeLabel ||
            !balancePositiveLabel
          ) {
            return;
          }

          const positive = getPositiveRatioFromGeometry(geometryState);
          const negative = 1 - positive;
          balancePositiveRatio = positive;

          const negPct = Math.round(negative * 100);
          const posPct = Math.round(positive * 100);
          const splitPct = negative * 100;

          balanceNegativeFill.style.width = `${splitPct}%`;
          balancePositiveFill.style.width = `${100 - splitPct}%`;
          balanceHandle.style.left = `${splitPct}%`;
          balanceNegativeLabel.textContent = `negativity ${negPct}%`;
          balancePositiveLabel.textContent = `positivity ${posPct}%`;
          balanceTrack.setAttribute("aria-valuenow", String(posPct));
          balanceTrack.setAttribute(
            "aria-valuetext",
            `${negPct}% negativity, ${posPct}% positivity`
          );
        }

        function getBalanceTrackXNorm(e) {
          const rect = balanceTrack.getBoundingClientRect();
          const width = Math.max(1, rect.width);
          const x = clamp(e.clientX - rect.left, 0, width);
          return x / width;
        }

        function createPath2DSafely(pathData) {
          if (typeof Path2D !== "function" || !pathData) return null;
          try {
            return new Path2D(pathData);
          } catch (_) {
            return null;
          }
        }

        let dividerProfile = BASE_PROFILE;
        const FACE_DIVIDER_PATH = createPath2DSafely(FACE_BASE_LEFT_PATH_D);
        const dividerProbeCanvas = document.createElement("canvas");
        const dividerProbeCtx = dividerProbeCanvas.getContext("2d");

        function smoothProfileSamples(profile, passes = 1, maxStep = 0.09) {
          if (!profile || profile.length < 5) return profile;
          let xs = profile.map((point) => point[1]);
          const n = xs.length;
          for (let pass = 0; pass < passes; pass += 1) {
            const next = xs.slice();
            for (let i = 1; i < n - 1; i += 1) {
              next[i] = (xs[i - 1] + 2 * xs[i] + xs[i + 1]) * 0.25;
            }
            xs = next;
          }
          for (let i = 1; i < n; i += 1) {
            const delta = xs[i] - xs[i - 1];
            if (Math.abs(delta) > maxStep) {
              xs[i] = xs[i - 1] + Math.sign(delta) * maxStep;
            }
          }
          return profile.map((point, index) => [point[0], clamp(xs[index], -1, 1)]);
        }

        function initializeDividerProfileFromSvgPath() {
          if (!dividerProbeCtx || !FACE_DIVIDER_PATH) return;
          const view = FACE_SVG_VIEWBOX;
          const probeSize = Math.max(2, Math.ceil(view));
          dividerProbeCanvas.width = probeSize;
          dividerProbeCanvas.height = probeSize;
          dividerProbeCtx.setTransform(1, 0, 0, 1, 0, 0);
          dividerProbeCtx.clearRect(0, 0, probeSize, probeSize);

          const sampleCount = 321;
          const scanStep = 0.4;
          const sampled = [];
          for (let i = 0; i < sampleCount; i += 1) {
            const yNorm = -1 + (2 * i) / (sampleCount - 1);
            const y = ((yNorm + 1) * 0.5) * view;
            let rightmostInside = null;

            for (let x = 0; x <= view; x += scanStep) {
              if (dividerProbeCtx.isPointInPath(FACE_DIVIDER_PATH, x, y)) {
                rightmostInside = x;
              }
            }

            if (rightmostInside == null) {
              sampled.push([yNorm, 0]);
              continue;
            }

            let lo = rightmostInside;
            let hi = Math.min(view, rightmostInside + scanStep);
            for (let j = 0; j < 14; j += 1) {
              const mid = (lo + hi) * 0.5;
              if (dividerProbeCtx.isPointInPath(FACE_DIVIDER_PATH, mid, y)) {
                lo = mid;
              } else {
                hi = mid;
              }
            }
            const xNorm = (lo / view) * 2 - 1;
            sampled.push([yNorm, xNorm]);
          }

          if (sampled.length >= 16) {
            // For load fidelity, preserve the raw sampled reference seam.
            dividerProfile = Object.freeze(
              sampled.map((point) => [point[0], clamp(point[1], -1, 1)])
            );
          }
        }
        initializeDividerProfileFromSvgPath();

        const FACE_SOURCE_PATHS = (() => {
          const eyeLeft = createPath2DSafely(FACE_SVG_PATH_D.eyeLeft);
          const shared = createPath2DSafely(FACE_SVG_PATH_D.shared);
          if (!eyeLeft || !shared) return null;
          return { eyeLeft, shared };
        })();

        function getCanvasScale() {
          return canvas.width / Math.max(1, canvas.clientWidth || 1);
        }

        function formatDisplayDate(date = new Date()) {
          const parts = new Intl.DateTimeFormat("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          }).formatToParts(date);
          const month = (parts.find((part) => part.type === "month")?.value || "").toUpperCase();
          const day = parts.find((part) => part.type === "day")?.value || "";
          const year = parts.find((part) => part.type === "year")?.value || "";
          return `${month} ${day} ${year}`.trim();
        }

        function renderDateStamps() {
          const stamp = formatDisplayDate(new Date());
          dateTop.textContent = stamp;
          dateBottom.textContent = stamp;
        }

        renderDateStamps();
        window.setInterval(renderDateStamps, 60_000);

        function formatFilenameStamp(date = new Date()) {
          const year = String(date.getFullYear());
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");
          const hour = String(date.getHours()).padStart(2, "0");
          const minute = String(date.getMinutes()).padStart(2, "0");
          const second = String(date.getSeconds()).padStart(2, "0");
          return {
            date: `${year}-${month}-${day}`,
            time: `${hour}-${minute}-${second}`,
          };
        }

        function setSaveStatus(message) {
          saveStatus.textContent = message;
          if (saveState.statusTimeout) {
            clearTimeout(saveState.statusTimeout);
            saveState.statusTimeout = 0;
          }
          if (!message) return;
          saveState.statusTimeout = window.setTimeout(() => {
            saveStatus.textContent = "";
            saveState.statusTimeout = 0;
          }, 2600);
        }

        function resizeCanvasToDisplaySize() {
          const rect = canvas.getBoundingClientRect();
          const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
          const w = Math.max(2, Math.round(rect.width * dpr));
          const h = Math.max(2, Math.round(rect.height * dpr));
          if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w;
            canvas.height = h;
          }
        }

        function rotatePoint(x, y, angle) {
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          return {
            x: x * cos - y * sin,
            y: x * sin + y * cos,
          };
        }

        function getLocalPoint(e) {
          const rect = canvas.getBoundingClientRect();
          const sx = canvas.width / Math.max(1, rect.width);
          const sy = canvas.height / Math.max(1, rect.height);
          const x = (e.clientX - rect.left) * sx;
          const y = (e.clientY - rect.top) * sy;
          const centered = { x: x - canvas.width * 0.5, y: y - canvas.height * 0.5 };
          return rotatePoint(centered.x, centered.y, -viewRotation.current);
        }

        function getRadius() {
          return Math.min(canvas.width, canvas.height) * 0.44;
        }

        function isInsideCircle(x, y, R) {
          return x * x + y * y <= R * R;
        }

        function sampleProfile(points, yNorm) {
          const yn = clamp(yNorm, -1, 1);
          const topY = points[0][0];
          const bottomY = points[points.length - 1][0];
          if (yn <= topY) return points[0][1] * smoothstep(-1, topY, yn);
          if (yn >= bottomY) return points[points.length - 1][1] * (1 - smoothstep(bottomY, 1, yn));

          for (let i = 0; i < points.length - 1; i += 1) {
            const a = points[i];
            const b = points[i + 1];
            if (yn < a[0] || yn > b[0]) continue;
            const t = (yn - a[0]) / Math.max(1e-9, b[0] - a[0]);
            return a[1] + (b[1] - a[1]) * t;
          }
          return 0;
        }

        function sampleProfileSlope(points, yNorm) {
          const h = 0.008;
          const y0 = clamp(yNorm - h, -1, 1);
          const y1 = clamp(yNorm + h, -1, 1);
          const x0 = sampleProfile(points, y0);
          const x1 = sampleProfile(points, y1);
          return (x1 - x0) / Math.max(1e-6, y1 - y0);
        }

        function landmarkPivotWeight(yNorm, landmark) {
          const tip = gaussian(yNorm, landmark.tipY, landmark.tipSigma);
          const base = gaussian(yNorm, landmark.baseY, landmark.baseSigma) * landmark.baseWeight;
          return clamp(tip - base, -1, 1);
        }

        function softClampUpper(value, maxValue, softness) {
          const s = Math.max(1e-6, softness);
          const over = value - maxValue;
          return maxValue + over / (1 + Math.exp(over / s));
        }

        function softClampLower(value, minValue, softness) {
          const s = Math.max(1e-6, softness);
          const under = minValue - value;
          return minValue - under / (1 + Math.exp(under / s));
        }

        function getGrabInfluence(yNorm) {
          const yn = clamp(yNorm, -1, 1);
          const sigma = 0.46;
          const topRaw = Math.exp(-Math.pow((yn + 0.52) / sigma, 2));
          const bottomRaw = Math.exp(-Math.pow((yn - 0.52) / sigma, 2));
          const sum = topRaw + bottomRaw + 1e-9;
          return { top: topRaw / sum, bottom: bottomRaw / sum };
        }

        function getNoseZoneAffinity(yNorm) {
          const yn = clamp(yNorm, -1, 1);
          const upperNose = gaussian(yn, -0.02, 0.2);
          const lowerNose = gaussian(yn, 0.24, 0.22);
          return clamp(Math.max(upperNose, lowerNose), 0, 1);
        }

        function getMouthZoneAffinity(yNorm) {
          const yn = clamp(yNorm, -1, 1);
          const core = gaussian(yn, 0.24, 0.2);
          const lower = gaussian(yn, 0.38, 0.24);
          return clamp(core * 0.94 + lower * 0.62, 0, 1);
        }

        function getGlobalDeformAmount() {
          const pushDelta =
            Math.max(Math.abs(state.whitePush - 0.5), Math.abs(state.blackPush - 0.5)) * 2;
          const liftDelta = Math.max(Math.abs(state.whiteLift), Math.abs(state.blackLift));
          const localXDelta = Math.max(
            Math.abs(state.whiteLocalShiftX),
            Math.abs(state.blackLocalShiftX)
          );
          const localYDelta = Math.max(
            Math.abs(state.whiteLocalShiftY),
            Math.abs(state.blackLocalShiftY)
          );
          const mouthWidthDelta = Math.max(
            Math.abs(state.whiteMouthWidth),
            Math.abs(state.blackMouthWidth)
          );
          const mouthHeightDelta = Math.max(
            Math.abs(state.whiteMouthHeight),
            Math.abs(state.blackMouthHeight)
          );
          return clamp(
            Math.max(pushDelta, liftDelta, localXDelta, localYDelta, mouthWidthDelta, mouthHeightDelta),
            0,
            1
          );
        }

        function dividerXAtY(y, R) {
          const yNorm = clamp(y / R, -1, 1);
          const outerX = Math.sqrt(Math.max(0, R * R - y * y));
          const dominance = clamp(state.whitePush - state.blackPush, -0.95, 0.95);
          const whiteDelta = (state.whitePush - 0.5) * 2;
          const blackDelta = (state.blackPush - 0.5) * 2;
          const computeRawX = (yn) => {
            const envelope = Math.pow(Math.max(0, 1 - yn * yn), 0.9);
            const focusWhite = gaussian(yn, clamp(state.whiteFocusY, -1, 1), 0.36);
            const focusBlack = gaussian(yn, clamp(state.blackFocusY, -1, 1), 0.36);
            const mouthWidthDriveRaw = clamp(
              state.whiteMouthWidth * focusWhite - state.blackMouthWidth * focusBlack,
              -6,
              6
            );
            const mouthHeightDriveRaw = clamp(
              state.whiteMouthHeight * focusWhite - state.blackMouthHeight * focusBlack,
              -6,
              6
            );
            const mouthWidthDrive = Math.tanh(mouthWidthDriveRaw * 0.34) * 1.45;
            const mouthHeightDrive = Math.tanh(mouthHeightDriveRaw * 0.34) * 1.35;
            const mouthCore = gaussian(yn, 0.24, 0.12);
            const mouthWide = gaussian(yn, 0.24, 0.28);
            const mouthUpper = gaussian(yn, 0.14, 0.14);
            const mouthLower = gaussian(yn, 0.37, 0.14);
            const noseBand = clamp(
              gaussian(yn, -0.02, 0.18) + gaussian(yn, 0.24, 0.2) * 0.82,
              0,
              1.5
            );
            const poleFade = 1 - smoothstep(0.74, 0.985, Math.abs(yn));
            const localYShiftRaw =
              (state.whiteLocalShiftY * focusWhite - state.blackLocalShiftY * focusBlack) *
              envelope *
              (0.24 + 0.52 * noseBand) *
              poleFade;
            const localYShiftNorm = 0.24 * Math.tanh(localYShiftRaw / 0.24);
            const mouthVerticalShiftRaw =
              mouthHeightDrive * (mouthWide * 0.11 + (mouthUpper - mouthLower) * 0.08);
            const mouthVerticalShiftNorm = 0.16 * Math.tanh(mouthVerticalShiftRaw / 0.16);
            const ySampleRaw = yn - localYShiftNorm - mouthVerticalShiftNorm;
            const ySampleLinear = clamp(ySampleRaw, -1, 1);
            const ySampleCurved = clamp(
              Math.tanh(ySampleRaw * 1.12) / Math.max(1e-6, Math.tanh(1.12)),
              -1,
              1
            );
            const verticalWarpMag = Math.abs(localYShiftNorm) + Math.abs(mouthVerticalShiftNorm);
            const verticalWarpT = smoothstep(0.018, 0.2, verticalWarpMag);
            const ySample = ySampleLinear * (1 - verticalWarpT) + ySampleCurved * verticalWarpT;
            const base = sampleProfile(dividerProfile, ySample) * R;
            const eyeZone = gaussian(ySample, -0.33, 0.22);
            const mouthZone = gaussian(ySample, 0.25, 0.24);
            const mouthCoreS = gaussian(ySample, 0.24, 0.12);
            const mouthWideS = gaussian(ySample, 0.24, 0.3);

            const sideDir = Math.tanh(dominance * 3.6);
            const sideSign = sideDir >= 0 ? 1 : -1;
            const sideBlend = 0.5 + 0.5 * sideDir;
            const dominanceAbs = Math.abs(dominance);
            const dominanceGate = smoothstep(0.14, 0.96, dominanceAbs);

            const dominanceShift =
              dominance * outerX * (0.58 + 0.09 * gaussian(ySample, 0, 0.5));
            const liftShift = (state.whiteLift - state.blackLift) * ySample * envelope * 0.26 * R;
            const localShift =
              (state.whiteLocalShiftX * focusWhite - state.blackLocalShiftX * focusBlack) *
              envelope *
              0.22 *
              R;
            const expressionShift =
              ((whiteDelta - blackDelta) * eyeZone * 0.1 -
                (whiteDelta - blackDelta) * mouthZone * 0.08) *
              R;
            const mouthHorizontalShiftRaw =
              (mouthWidthDrive * (0.14 * mouthWideS + 0.13 * mouthCoreS) +
                mouthHeightDrive * 0.03 * mouthWideS) *
              R;
            const mouthShiftCap = outerX * (0.09 + 0.08 * mouthWideS);
            const mouthHorizontalShift = clamp(
              mouthHorizontalShiftRaw,
              -mouthShiftCap,
              mouthShiftCap
            );
            const preFeatureX = base + dominanceShift + liftShift + localShift + expressionShift;
            const edgeDistanceN =
              outerX > 1e-6 ? clamp((outerX - Math.abs(preFeatureX)) / outerX, 0, 1) : 0;
            const featureEdgeGuard = 0.08 + 0.92 * Math.pow(edgeDistanceN, 0.72);
            const positiveNoseShape =
              (gaussian(ySample, -0.11, 0.15) * 0.2 +
                gaussian(ySample, 0.02, 0.14) * 0.36 +
                gaussian(ySample, 0.14, 0.12) * 0.12 -
                gaussian(ySample, 0.3, 0.14) * 0.08) *
              R;
            const negativeNoseShape =
              (-gaussian(ySample, -0.12, 0.16) * 0.14 +
                gaussian(ySample, 0.06, 0.12) * 0.08 +
                gaussian(ySample, 0.2, 0.13) * 0.38 +
                gaussian(ySample, 0.32, 0.13) * 0.12) *
              R;
            const whiteFeatureEnergy = clamp(
              Math.abs(state.whiteLift) * 0.32 +
                Math.abs(state.whiteLocalShiftY) * 0.38 +
                Math.abs(state.whiteLocalShiftX) * 0.2 +
                Math.abs(state.whiteMouthHeight) * 0.22,
              0,
              1.6
            );
            const blackFeatureEnergy = clamp(
              Math.abs(state.blackLift) * 0.32 +
                Math.abs(state.blackLocalShiftY) * 0.38 +
                Math.abs(state.blackLocalShiftX) * 0.2 +
                Math.abs(state.blackMouthHeight) * 0.22,
              0,
              1.6
            );
            // Identity lock: positive side keeps a rounded nose, negative keeps pointed.
            const roundNoseHold = 0.07 + 0.12 * smoothstep(0.02, 1, whiteFeatureEnergy);
            const sharpNoseHold = 0.07 + 0.12 * smoothstep(0.02, 1, blackFeatureEnergy);
            const sideNoseShift =
              (positiveNoseShape * roundNoseHold - negativeNoseShape * sharpNoseHold) *
              featureEdgeGuard;
            // Landmark pivot field: moves tip/corner while keeping nearby base anchored.
            const activeLocalY =
              state.whiteLocalShiftY * sideBlend + state.blackLocalShiftY * (1 - sideBlend);
            const activeMouthH =
              state.whiteMouthHeight * sideBlend + state.blackMouthHeight * (1 - sideBlend);
            const activeLift = state.whiteLift * sideBlend + state.blackLift * (1 - sideBlend);
            const pivotDriveRaw =
              sideDir * (activeLocalY * 0.42 + activeMouthH * 0.34 + activeLift * 0.28);
            const pivotDrive = Math.tanh(pivotDriveRaw * 0.42);
            const pivotShiftNorm = pivotDrive * 0.052 * dominanceGate;
            const profileSlope = sampleProfileSlope(dividerProfile, ySample);
            const pivotWeightUpper = landmarkPivotWeight(ySample, FACE_LANDMARKS.upper);
            const pivotWeightLower = landmarkPivotWeight(ySample, FACE_LANDMARKS.lower);
            const pivotShiftX =
              profileSlope *
              pivotShiftNorm *
              (pivotWeightUpper + pivotWeightLower) *
              R *
              featureEdgeGuard;

            return (
              preFeatureX +
              mouthHorizontalShift * featureEdgeGuard +
              sideNoseShift +
              pivotShiftX
            );
          };

          let x = computeRawX(yNorm);

          const edgePad = FACE_EDGE_PADDING_CSS * getCanvasScale();
          const padded = Math.max(0, outerX - edgePad);
          if (padded <= 1e-6) return 0;
          const sideDir = Math.tanh(dominance * 3.6);
          const sideSign = sideDir >= 0 ? 1 : -1;
          const sideBlend = 0.5 + 0.5 * sideDir;

          // Nose wall "mass": when pushed into the rim, shift deformation upward and spread it
          // instead of creating sharp clipped corners.
          const wallRatio = Math.abs(x) / Math.max(1e-6, padded);
          const pressureBase =
            smoothstep(0.72, 0.995, wallRatio) * smoothstep(0.32, 0.95, Math.abs(dominance));
          const pressureTowardActiveSide = x * sideSign > 0 ? 1 : 0.35;
          const noseBand = clamp(
            gaussian(yNorm, -0.02, 0.2) + gaussian(yNorm, 0.2, 0.22) * 0.7,
            0,
            1.35
          );
          const massBlend = clamp(pressureBase * pressureTowardActiveSide * noseBand, 0, 0.88);
          if (massBlend > 1e-4) {
            const yLiftNorm = 0.14 * massBlend;
            const yMassNorm = clamp(yNorm - yLiftNorm, -1, 1);
            const xMass = computeRawX(yMassNorm);
            x = x * (1 - massBlend * 0.84) + xMass * (massBlend * 0.84);
            x -= sideSign * massBlend * 0.035 * R;
          }

          // Keep upper lip expression behind the nose front so it doesn't spike past it.
          const dominanceGate = smoothstep(0.22, 0.96, Math.abs(dominance));
          const upperLipBand = clamp(
            gaussian(yNorm, 0.14, 0.11) * 1.05 + gaussian(yNorm, 0.24, 0.16) * 0.42,
            0,
            1
          );
          const lipLeash = upperLipBand * dominanceGate;
          if (lipLeash > 1e-4) {
            const noseFrontSampleA = computeRawX(clamp(-0.06, -1, 1));
            const noseFrontSampleB = computeRawX(clamp(0.02, -1, 1));
            const noseFrontSampleC = computeRawX(clamp(0.1, -1, 1));
            const noseFrontX =
              sideSign > 0
                ? Math.max(noseFrontSampleA, noseFrontSampleB, noseFrontSampleC)
                : Math.min(noseFrontSampleA, noseFrontSampleB, noseFrontSampleC);
            const lipAllowance = (0.045 + 0.032 * dominanceGate) * R;
            const lipCap = noseFrontX + sideSign * lipAllowance;
            const lipSoftness = Math.max(1.2, R * 0.014);
            const clampedX =
              sideSign > 0
                ? softClampUpper(x, lipCap, lipSoftness)
                : softClampLower(x, lipCap, lipSoftness);
            x = x * (1 - lipLeash * 0.95) + clampedX * (lipLeash * 0.95);
          }

          // Mouth uses three anchors: upper lip, lower lip, and interior apex.
          // The divider in the mouth band is blended toward that anchor curve and
          // hard-limited so interior never extends beyond the lip edge.
          const mouthBandGate =
            smoothstep(0.07, 0.14, yNorm) * (1 - smoothstep(0.41, 0.5, yNorm));
          if (mouthBandGate > 1e-4) {
            const yUpper = lerp(0.14, 0.1, sideBlend);
            const yLower = lerp(0.39, 0.35, sideBlend);
            const activeMouthH =
              state.whiteMouthHeight * sideBlend + state.blackMouthHeight * (1 - sideBlend);
            const apexBias = Math.tanh(activeMouthH * 0.34);
            const apexBase = lerp(0.262, 0.214, sideBlend);
            const yApex = clamp(apexBase - apexBias * 0.085, yUpper + 0.03, yLower - 0.03);

            const xUpper = computeRawX(yUpper);
            const xLower = computeRawX(yLower);
            let xApex = computeRawX(yApex);

            const lipEdge = sideSign > 0 ? Math.max(xUpper, xLower) : Math.min(xUpper, xLower);
            const interiorInset = (0.021 + 0.02 * smoothstep(0.2, 0.95, Math.abs(dominance))) * R;
            const apexSoftness = Math.max(1, R * 0.012);
            if (sideSign > 0) {
              xApex = softClampUpper(xApex, lipEdge - interiorInset, apexSoftness);
            } else {
              xApex = softClampLower(xApex, lipEdge + interiorInset, apexSoftness);
            }

            const s = clamp((yNorm - yUpper) / Math.max(1e-6, yLower - yUpper), 0, 1);
            const a = clamp((yApex - yUpper) / Math.max(1e-6, yLower - yUpper), 0.06, 0.94);
            let xAnchorCurve;
            if (s <= a) {
              const t = clamp(s / Math.max(1e-6, a), 0, 1);
              const h = t * t * (3 - 2 * t);
              xAnchorCurve = xUpper + (xApex - xUpper) * h;
            } else {
              const t = clamp((s - a) / Math.max(1e-6, 1 - a), 0, 1);
              const h = t * t * (3 - 2 * t);
              xAnchorCurve = xApex + (xLower - xApex) * h;
            }

            const curveBlend = mouthBandGate * smoothstep(0.08, 0.96, Math.abs(dominance));
            x = x * (1 - curveBlend) + xAnchorCurve * curveBlend;

            // Lip boundary: no part of mouth band should outrun lip edge.
            const lipAllowanceTight = 0.004 * R;
            const lipCapTight = lipEdge + sideSign * lipAllowanceTight;
            const lipTightSoftness = Math.max(0.8, R * 0.008);
            if (sideSign > 0) {
              x = softClampUpper(x, lipCapTight, lipTightSoftness);
            } else {
              x = softClampLower(x, lipCapTight, lipTightSoftness);
            }
          }

          // Keep mouth wall behind nose tip in expressive drags to prevent spikes.
          const mouthContainGate =
            smoothstep(0.09, 0.17, yNorm) *
            (1 - smoothstep(0.47, 0.57, yNorm)) *
            smoothstep(0.18, 0.96, Math.abs(dominance));
          if (mouthContainGate > 1e-4) {
            const noseSampleA = computeRawX(-0.06);
            const noseSampleB = computeRawX(0.02);
            const noseSampleC = computeRawX(0.12);
            const noseFront =
              sideSign > 0
                ? Math.max(noseSampleA, noseSampleB, noseSampleC)
                : Math.min(noseSampleA, noseSampleB, noseSampleC);
            const mouthInset = (0.026 + 0.02 * mouthContainGate) * R;
            const mouthCap = noseFront - sideSign * mouthInset;
            const mouthSoftness = Math.max(1.2, R * 0.013);
            const constrainedMouthX =
              sideSign > 0
                ? softClampUpper(x, mouthCap, mouthSoftness)
                : softClampLower(x, mouthCap, mouthSoftness);
            x = lerp(x, constrainedMouthX, mouthContainGate);
          }

          const hardLimit = outerX * 0.998;
          if (hardLimit <= 1e-9) return 0;
          x = clamp(x, -padded, padded);
          return clamp(x, -hardLimit, hardLimit);
        }

        function smoothDividerPoints(points, passes = 3) {
          if (!points || points.length < 5 || passes <= 0) return points;
          let xs = points.map((p) => p.x);
          const n = xs.length;

          for (let pass = 0; pass < passes; pass += 1) {
            const next = xs.slice();
            for (let i = 2; i < n - 2; i += 1) {
              next[i] = (xs[i - 2] + 4 * xs[i - 1] + 6 * xs[i] + 4 * xs[i + 1] + xs[i + 2]) / 16;
            }
            next[1] = (xs[0] + 2 * xs[1] + xs[2]) * 0.25;
            next[n - 2] = (xs[n - 3] + 2 * xs[n - 2] + xs[n - 1]) * 0.25;
            xs = next;
          }

          return points.map((p, i) => ({ x: xs[i], y: p.y }));
        }

        function relaxFeatureKinks(points, R, intensity = 1) {
          if (!points || points.length < 5) return points;
          if (intensity <= 1e-4) return points;
          let xs = points.map((p) => p.x);
          const n = xs.length;
          const level = clamp(intensity, 0, 1);

          for (let pass = 0; pass < 2; pass += 1) {
            const next = xs.slice();
            for (let i = 2; i < n - 2; i += 1) {
              const yNorm = points[i].y / Math.max(1e-6, R);
              const zone = Math.max(
                gaussian(yNorm, -0.02, 0.11),
                gaussian(yNorm, 0.14, 0.13),
                gaussian(yNorm, 0.24, 0.17),
                gaussian(yNorm, 0.34, 0.13)
              );
              if (zone < 0.08) continue;

              const dPrev = xs[i] - xs[i - 1];
              const dNext = xs[i + 1] - xs[i];
              const cusp = dPrev * dNext < 0;
              const curvatureN = Math.abs(xs[i + 1] - 2 * xs[i] + xs[i - 1]) / Math.max(1e-6, R);
              const curvGate = smoothstep(0.014, 0.062, curvatureN);
              const blend =
                zone * (cusp ? 0.72 : 0.44) * curvGate * (0.7 + 0.3 * level);
              if (blend <= 1e-4) continue;

              const localAvg = (xs[i - 1] + 2 * xs[i] + xs[i + 1]) * 0.25;
              next[i] = xs[i] * (1 - blend) + localAvg * blend;
            }
            xs = next;
          }

          return points.map((p, i) => ({ x: xs[i], y: p.y }));
        }

        function limitDividerCurvature(points, R, intensity = 1, passes = 2) {
          if (!points || points.length < 5) return points;
          const n = points.length;
          let xs = points.map((p) => p.x);
          const level = clamp(intensity, 0, 1);
          const blendBase = 0.42 + 0.28 * level;

          for (let pass = 0; pass < passes; pass += 1) {
            const next = xs.slice();
            for (let i = 1; i < n - 1; i += 1) {
              const yNorm = clamp(points[i].y / Math.max(1e-6, R), -1, 1);
              const zone =
                0.35 +
                0.65 *
                  Math.max(
                    gaussian(yNorm, -0.02, 0.16),
                    gaussian(yNorm, 0.17, 0.2),
                    gaussian(yNorm, 0.36, 0.2)
                  );
              const maxCurv = Math.max(1e-4, R * (0.011 + 0.008 * zone));
              const curv = xs[i + 1] - 2 * xs[i] + xs[i - 1];
              const clampedCurv = clamp(curv, -maxCurv, maxCurv);
              if (Math.abs(curv - clampedCurv) <= 1e-4) continue;
              const target = (xs[i - 1] + xs[i + 1] - clampedCurv) * 0.5;
              next[i] = lerp(xs[i], target, blendBase);
            }
            xs = next;
          }

          return points.map((p, i) => ({ x: xs[i], y: p.y }));
        }

        function enforceFaceIdentityTopology(points, R, deformAmount = 0) {
          if (!points || points.length < 5) return points;
          const n = points.length;
          let xs = points.map((p) => p.x);
          const ys = points.map((p) => p.y);
          const smooth = (arr) => {
            const next = arr.slice();
            for (let i = 1; i < n - 1; i += 1) {
              next[i] = (arr[i - 1] + 2 * arr[i] + arr[i + 1]) * 0.25;
            }
            return next;
          };

          const localYDrive = clamp(
            (state.whiteLocalShiftY - state.blackLocalShiftY) * 0.07 +
              (state.whiteLift - state.blackLift) * 0.05,
            -0.12,
            0.12
          );
          let noseY = clamp(0.02 + localYDrive, -0.1, 0.14);
          let mouthY = clamp(
            0.31 +
              localYDrive * 0.82 +
              (state.whiteMouthHeight - state.blackMouthHeight) * 0.03,
            0.2,
            0.52
          );
          if (mouthY - noseY < 0.18) mouthY = noseY + 0.18;
          mouthY = clamp(mouthY, 0.2, 0.54);

          const widthDrive = Math.tanh((state.whiteMouthWidth - state.blackMouthWidth) * 0.16);
          const heightDrive = Math.tanh((state.whiteMouthHeight - state.blackMouthHeight) * 0.18);
          const noseDrive = Math.tanh((state.whiteLift - state.blackLift) * 0.2);
          const logicStrength = clamp(
            0.56 + 0.24 * smoothstep(0.08, 0.88, deformAmount),
            0.56,
            0.82
          );

          for (let i = 0; i < n; i += 1) {
            const yNorm = clamp(ys[i] / Math.max(1e-6, R), -1, 1);
            const base = sampleProfile(dividerProfile, yNorm) * R;

            const noseCore = gaussian(yNorm, noseY, 0.13);
            const noseTip = gaussian(yNorm, noseY - 0.07, 0.085);
            const noseBase = gaussian(yNorm, noseY + 0.11, 0.11);
            const roundNose =
              (0.11 + 0.045 * noseDrive) * noseCore * R +
              (0.055 + 0.015 * noseDrive) * noseTip * R -
              0.03 * noseBase * R;

            const mouthCore = gaussian(yNorm, mouthY, 0.095);
            const mouthTail = gaussian(yNorm, mouthY + 0.085, 0.08);
            const mouthEntry = gaussian(yNorm, mouthY - 0.08, 0.1);
            const sharpMouth =
              (0.13 + 0.06 * widthDrive + 0.04 * heightDrive) * mouthCore * R -
              (0.04 + 0.02 * heightDrive) * mouthTail * R +
              0.02 * mouthEntry * R;

            const target = base + roundNose - sharpMouth;
            const zone = clamp(
              0.68 * gaussian(yNorm, noseY, 0.2) + 0.94 * gaussian(yNorm, mouthY, 0.2),
              0,
              1
            );
            xs[i] = lerp(xs[i], target, zone * logicStrength);
          }

          let noseFront = -Infinity;
          for (let i = 0; i < n; i += 1) {
            const yNorm = clamp(ys[i] / Math.max(1e-6, R), -1, 1);
            const band = gaussian(yNorm, noseY, 0.15);
            if (band > 0.14) {
              noseFront = Math.max(noseFront, xs[i]);
            }
          }

          if (Number.isFinite(noseFront)) {
            for (let i = 0; i < n; i += 1) {
              const yNorm = clamp(ys[i] / Math.max(1e-6, R), -1, 1);
              const gate =
                smoothstep(noseY + 0.08, mouthY + 0.02, yNorm) *
                (1 - smoothstep(mouthY + 0.2, mouthY + 0.28, yNorm));
              if (gate <= 1e-4) continue;
              const cap = noseFront - (0.02 + 0.012 * gate) * R;
              xs[i] = lerp(
                xs[i],
                softClampUpper(xs[i], cap, Math.max(1.1, R * 0.011)),
                gate
              );
            }
          }

          xs = smooth(xs);
          xs = smooth(xs);
          return points.map((p, i) => ({ x: xs[i], y: p.y }));
        }

        function limitDividerStep(points, R, maxStepNorm = 0.022) {
          if (!points || points.length < 3) return points;
          const maxStep = Math.max(1e-4, Math.abs(R) * maxStepNorm);
          const xs = points.map((p) => p.x);
          const n = xs.length;
          const soften = (delta) => maxStep * Math.tanh(delta / maxStep);

          for (let i = 1; i < n; i += 1) {
            xs[i] = xs[i - 1] + soften(xs[i] - xs[i - 1]);
          }
          for (let i = n - 2; i >= 0; i -= 1) {
            xs[i] = xs[i + 1] + soften(xs[i] - xs[i + 1]);
          }

          return points.map((p, i) => ({ x: xs[i], y: p.y }));
        }

        function stabilizeDividerNearRim(points, R, deformAmount) {
          if (!points || points.length < 3) return points;
          const maxBlend = clamp(0.08 + deformAmount * 0.1, 0.08, 0.2);

          return points.map((point) => {
            const y = point.y;
            const outerX = Math.sqrt(Math.max(0, R * R - y * y));
            if (outerX <= 1e-6) return point;

            const separationN = clamp((outerX - Math.abs(point.x)) / outerX, 0, 1);
            const rimProximity = clamp((0.22 - separationN) / 0.22, 0, 1);
            if (rimProximity <= 0) return point;

            const yNorm = clamp(y / Math.max(1e-6, R), -1, 1);
            const baseX = sampleProfile(dividerProfile, yNorm) * R;
            const blend = maxBlend * rimProximity * rimProximity;
            return {
              x: point.x * (1 - blend) + baseX * blend,
              y,
            };
          });
        }

        function buildDivider(R) {
          const steps = 760;
          const points = [];
          for (let i = 0; i <= steps; i += 1) {
            const y = -R + (2 * R * i) / steps;
            points.push({ x: dividerXAtY(y, R), y });
          }

          const deform = getGlobalDeformAmount();
          const mouthEnergy = clamp(
            Math.max(
              Math.abs(state.whiteMouthWidth),
              Math.abs(state.blackMouthWidth),
              Math.abs(state.whiteMouthHeight),
              Math.abs(state.blackMouthHeight)
            ) / 4.6,
            0,
            1
          );
          if (deform <= 0.004 && mouthEnergy <= 0.004) {
            return points;
          }
          const preStep = 0.026 - mouthEnergy * 0.006;
          const postStep = 0.018 - mouthEnergy * 0.005;
          const smoothPasses = (deform < 0.22 ? 5 : 6) + (mouthEnergy > 0.28 ? 1 : 0);
          const tailPasses = mouthEnergy > 0.42 ? 2 : 2;

          const pre = limitDividerStep(points, R, preStep);
          const smoothed = smoothDividerPoints(pre, smoothPasses);
          const post = limitDividerStep(smoothed, R, postStep);
          const relaxed = relaxFeatureKinks(post, R, mouthEnergy);
          const curvatureLimited = limitDividerCurvature(
            relaxed,
            R,
            mouthEnergy,
            mouthEnergy > 0.45 ? 3 : 2
          );
          const topologyLocked = enforceFaceIdentityTopology(curvatureLimited, R, deform);
          const rimStabilized = stabilizeDividerNearRim(topologyLocked, R, deform);
          return smoothDividerPoints(rimStabilized, tailPasses);
        }

        function dividerXFromPointsAtY(points, y, R) {
          if (!points || points.length < 2) return dividerXAtY(y, R);
          if (y <= -R) return points[0].x;
          if (y >= R) return points[points.length - 1].x;

          const normalized = (y + R) / (2 * R);
          const t = normalized * (points.length - 1);
          const i0 = Math.floor(t);
          const i1 = Math.min(points.length - 1, i0 + 1);
          const localT = t - i0;
          const p0 = points[i0];
          const p1 = points[i1];
          return p0.x + (p1.x - p0.x) * localT;
        }

        function dividerSlopeFromPointsAtY(points, y, R) {
          const step = (2 * R) / Math.max(32, points.length - 1);
          const y0 = clamp(y - step, -R, R);
          const y1 = clamp(y + step, -R, R);
          const x0 = dividerXFromPointsAtY(points, y0, R);
          const x1 = dividerXFromPointsAtY(points, y1, R);
          return (x1 - x0) / Math.max(1e-6, y1 - y0);
        }

        function dividerNormalDistanceFromPoints(x, y, R, points) {
          const dx = x - dividerXFromPointsAtY(points, y, R);
          const slope = dividerSlopeFromPointsAtY(points, y, R);
          return Math.abs(dx) / Math.sqrt(1 + slope * slope);
        }

        function isWhiteAt(x, y, R, dividerPoints) {
          return x <= dividerXFromPointsAtY(dividerPoints, y, R);
        }

        function easeStateTowardTarget() {
          let moving = false;
          for (let i = 0; i < STATE_KEYS.length; i += 1) {
            const key = STATE_KEYS[i];
            const current = state[key];
            const target = stateTarget[key];
            const delta = target - current;
            if (Math.abs(delta) <= 1e-4) {
              state[key] = target;
              continue;
            }
            const follow = drag.active ? 0.3 : 0.2;
            state[key] = current + delta * follow;
            if (Math.abs(target - state[key]) > 1e-4) moving = true;
          }
          return moving;
        }

        function appendSmoothDivider(points) {
          if (!points || points.length < 2) return;
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length - 1; i += 1) {
            const curr = points[i];
            const next = points[i + 1];
            const midX = (curr.x + next.x) * 0.5;
            const midY = (curr.y + next.y) * 0.5;
            ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
          }
          const last = points[points.length - 1];
          ctx.lineTo(last.x, last.y);
        }

        function traceSmoothDivider(points) {
          ctx.beginPath();
          appendSmoothDivider(points);
        }

        function appendBlackRegionPath(points, R) {
          appendSmoothDivider(points);
          const arcSteps = 260;
          for (let i = 0; i <= arcSteps; i += 1) {
            const t = i / arcSteps;
            const theta = Math.PI * 0.5 - Math.PI * t;
            ctx.lineTo(R * Math.cos(theta), R * Math.sin(theta));
          }
          ctx.closePath();
        }

        function traceBlackRegionPath(points, R) {
          ctx.beginPath();
          appendBlackRegionPath(points, R);
        }

        function clipHostRegion(side, geometryState) {
          if (side === "white") {
            ctx.beginPath();
            ctx.arc(0, 0, geometryState.R, 0, TAU);
            appendBlackRegionPath(geometryState.dividerPoints, geometryState.R);
            ctx.clip("evenodd");
          } else {
            traceBlackRegionPath(geometryState.dividerPoints, geometryState.R);
            ctx.clip();
          }
        }

        function hostSpanAtY(y, R, side, dividerPoints, pad) {
          const ySafe = clamp(y, -R + pad, R - pad);
          const outer = Math.max(0, Math.sqrt(Math.max(0, R * R - ySafe * ySafe)) - pad);
          const divider = clamp(dividerXFromPointsAtY(dividerPoints, ySafe, R), -outer, outer);

          if (side === "white") {
            return {
              y: ySafe,
              divider,
              minX: -outer,
              maxX: divider - pad,
            };
          }

          return {
            y: ySafe,
            divider,
            minX: divider + pad,
            maxX: outer,
          };
        }

        function constrainPointToHost(x, y, R, side, dividerPoints, pad) {
          const span = hostSpanAtY(y, R, side, dividerPoints, pad);
          if (span.maxX < span.minX) {
            return { x: (span.minX + span.maxX) * 0.5, y: span.y };
          }
          return {
            x: clamp(x, span.minX, span.maxX),
            y: span.y,
          };
        }

        function isInsideHost(x, y, R, isTop, dividerPoints) {
          if (!isInsideCircle(x, y, R)) return false;
          const white = isWhiteAt(x, y, R, dividerPoints);
          return isTop ? white : !white;
        }

        function rayBoundaryDistance(cx, cy, dirX, dirY, R, isTop, dividerPoints) {
          const cDot = cx * dirX + cy * dirY;
          const cSq = cx * cx + cy * cy;
          const disc = cDot * cDot + (R * R - cSq);
          if (disc <= 0) return 0;
          const outerT = -cDot + Math.sqrt(disc);
          let lo = 0;
          let hi = Math.max(1e-4, outerT + 1);

          for (let i = 0; i < 14; i += 1) {
            const mid = (lo + hi) * 0.5;
            const px = cx + dirX * mid;
            const py = cy + dirY * mid;
            if (isInsideHost(px, py, R, isTop, dividerPoints)) {
              lo = mid;
            } else {
              hi = mid;
            }
          }
          return lo;
        }

        function getEyeRoomAt(x, y, R, isTop, padding, dividerPoints) {
          if (!isInsideCircle(x, y, R)) return 0;
          const white = isWhiteAt(x, y, R, dividerPoints);
          if ((isTop && !white) || (!isTop && white)) return 0;
          const dOuter = R - Math.hypot(x, y);
          const dDivider = dividerNormalDistanceFromPoints(x, y, R, dividerPoints);
          const coarseRoom = Math.max(0, Math.min(dOuter, dDivider) - padding);

          const raySamples = 20;
          let nearestEdge = Infinity;
          for (let i = 0; i < raySamples; i += 1) {
            const angle = (i / raySamples) * TAU;
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);
            const boundaryDist = rayBoundaryDistance(x, y, dirX, dirY, R, isTop, dividerPoints);
            nearestEdge = Math.min(nearestEdge, boundaryDist);
          }
          const sampledRoom = Math.max(0, nearestEdge - padding);
          return coarseRoom * 0.2 + sampledRoom * 0.8;
        }

        function constrainEyeToBlob(targetX, targetY, R, r, isTop, padding, dividerPoints) {
          const safePadding = padding;
          const safeOuterR = Math.max(0, R - (r + safePadding));
          const steps = 260;
          let best = null;

          for (let i = 0; i <= steps; i += 1) {
            const y = -safeOuterR + (2 * safeOuterR * i) / steps;
            const outerX = Math.sqrt(Math.max(0, safeOuterR * safeOuterR - y * y));
            const dividerX = dividerXFromPointsAtY(dividerPoints, y, R);
            const wall = r + safePadding;
            let left = -outerX;
            let right = outerX;
            if (isTop) {
              right = Math.min(right, dividerX - wall);
            } else {
              left = Math.max(left, dividerX + wall);
            }
            if (right < left) continue;

            const x = clamp(targetX, left, right);
            const distSq = (x - targetX) * (x - targetX) + (y - targetY) * (y - targetY);
            if (!best || distSq < best.distSq) {
              best = { x, y, distSq };
            }
          }

          if (!best) return null;
          return { x: best.x, y: best.y };
        }

        function getEyeFeatureSafeY(y, isTop, R) {
          const sideFocus = clamp(isTop ? state.whiteFocusY : state.blackFocusY, -1, 1);
          const sideLift = isTop ? state.whiteLift : state.blackLift;
          const sideLocalY = isTop ? state.whiteLocalShiftY : state.blackLocalShiftY;
          const sideMouthH = isTop ? state.whiteMouthHeight : state.blackMouthHeight;
          const anchorY = isTop ? EYE_LOAD_TARGETS.top.yNorm : EYE_LOAD_TARGETS.bottom.yNorm;
          const focusDrift = sideFocus - anchorY;
          const dynamicDrift =
            0.008 * focusDrift + 0.004 * sideLift + 0.003 * sideLocalY + 0.001 * sideMouthH;

          if (isTop) {
            const maxY = clamp((-0.46 + dynamicDrift) * R, -0.92 * R, -0.36 * R);
            return Math.min(y, maxY);
          }

          const minY = clamp((0.5 + dynamicDrift) * R, 0.36 * R, 0.92 * R);
          return Math.max(y, minY);
        }

        function scanEyePlacementAtRadius(
          targetX,
          targetY,
          R,
          r,
          isTop,
          padding,
          dividerPoints
        ) {
          const yMin = isTop ? -0.95 * R : 0.3 * R;
          const yMax = isTop ? -0.3 * R : 0.95 * R;
          const steps = 72;
          let best = null;

          for (let i = 0; i <= steps; i += 1) {
            const t = i / steps;
            const yCandidate = yMin + (yMax - yMin) * t;
            const ySafe = getEyeFeatureSafeY(yCandidate, isTop, R);
            const point = constrainEyeToBlob(targetX, ySafe, R, r, isTop, padding, dividerPoints);
            if (!point) continue;
            const dx = point.x - targetX;
            const dy = point.y - targetY;
            const distSq = dx * dx + dy * dy * 1.35;
            if (!best || distSq < best.distSq) {
              best = { x: point.x, y: point.y, distSq };
            }
          }

          if (!best) return null;
          return { x: best.x, y: best.y };
        }

        function fitEyeInsideBlob(dot, R, isTop, padding, dividerPoints, sideVisibleRatio = 1) {
          const canHide = sideVisibleRatio <= EYE_HIDE_AREA_THRESHOLD;
          const hiddenMinEyePx = Math.max(0.08, 0.16 * getCanvasScale());
          const visibleMinEyePx = Math.max(R * 0.028, 1.2 * getCanvasScale());
          const minEyePx = canHide ? hiddenMinEyePx : visibleMinEyePx;
          const targetYSafe = getEyeFeatureSafeY(dot.y, isTop, R);
          let radius = Math.max(minEyePx, dot.r);
          let point = constrainEyeToBlob(dot.x, targetYSafe, R, radius, isTop, padding, dividerPoints);

          if (!point && !canHide) {
            const spanSafe = hostSpanAtY(targetYSafe, R, isTop ? "white" : "black", dividerPoints, padding);
            const spanCenterX = (spanSafe.minX + spanSafe.maxX) * 0.5;
            point = constrainEyeToBlob(spanCenterX, targetYSafe, R, radius, isTop, padding, dividerPoints);
          }

          if (!point && !canHide) {
            point = scanEyePlacementAtRadius(
              dot.x,
              targetYSafe,
              R,
              radius,
              isTop,
              padding,
              dividerPoints
            );
          }

          for (let i = 0; i < 8 && !point; i += 1) {
            const nextRadius = canHide ? radius * 0.84 : Math.max(minEyePx, radius * 0.95);
            if (Math.abs(nextRadius - radius) <= 1e-4) break;
            radius = nextRadius;
            point = constrainEyeToBlob(dot.x, targetYSafe, R, radius, isTop, padding, dividerPoints);
            if (!point && !canHide) {
              point = scanEyePlacementAtRadius(
                dot.x,
                targetYSafe,
                R,
                radius,
                isTop,
                padding,
                dividerPoints
              );
            }
          }

          if (!point) {
            const fallbackY = getEyeFeatureSafeY(isTop ? -0.5 * R : 0.5 * R, isTop, R);
            const fallbackX = dividerXFromPointsAtY(dividerPoints, 0, R);
            radius = Math.max(minEyePx, Math.min(radius, canHide ? R * 0.035 : R * 0.12));
            point = constrainEyeToBlob(
              fallbackX,
              fallbackY,
              R,
              radius,
              isTop,
              padding,
              dividerPoints
            );
          }

          if (!point && !canHide) {
            point = scanEyePlacementAtRadius(
              dot.x,
              targetYSafe,
              R,
              Math.max(minEyePx, radius),
              isTop,
              padding,
              dividerPoints
            );
          }

          if (!point && canHide) {
            radius = Math.max(hiddenMinEyePx * 0.5, 0.02);
            const fallbackY = getEyeFeatureSafeY(isTop ? -0.5 * R : 0.5 * R, isTop, R);
            const fallbackX = dividerXFromPointsAtY(dividerPoints, fallbackY, R);
            point = constrainEyeToBlob(
              fallbackX,
              fallbackY,
              R,
              radius,
              isTop,
              padding,
              dividerPoints
            );
          }

          if (!point) {
            point = { x: dot.x, y: targetYSafe };
          }

          return { x: point.x, y: getEyeFeatureSafeY(point.y, isTop, R), r: radius };
        }

        function stabilizeEyeCenter(targetDot, key, R, isTop, padding, dividerPoints, sideVisibleRatio = 1) {
          const memory = eyeMemory[key];
          const fittedTarget = fitEyeInsideBlob(
            targetDot,
            R,
            isTop,
            padding,
            dividerPoints,
            sideVisibleRatio
          );

          if (!memory) {
            eyeMemory[key] = { x: fittedTarget.x, y: fittedTarget.y, r: fittedTarget.r };
            return fittedTarget;
          }

          const distN =
            Math.hypot(fittedTarget.x - memory.x, fittedTarget.y - memory.y) / Math.max(1e-6, R);
          const follow = clamp(0.18 + distN * 0.32, 0.18, 0.44);
          const rFollow = 0.3;

          memory.x += (fittedTarget.x - memory.x) * follow;
          memory.y += (fittedTarget.y - memory.y) * follow;
          if (typeof memory.r !== "number") {
            memory.r = fittedTarget.r;
          }
          memory.r += (fittedTarget.r - memory.r) * rFollow;

          const fittedMemory = fitEyeInsideBlob(
            { x: memory.x, y: memory.y, r: memory.r },
            R,
            isTop,
            padding,
            dividerPoints,
            sideVisibleRatio
          );
          memory.x = fittedMemory.x;
          memory.y = fittedMemory.y;
          memory.r = fittedMemory.r;

          return { x: memory.x, y: memory.y, r: memory.r };
        }

        function findEyeAuto(R, region, padding, dividerPoints) {
          const isTop = region === "top";
          const key = isTop ? "top" : "bottom";
          const side = isTop ? "white" : "black";
          const anchor = EYE_LOAD_TARGETS[key];
          const sideState = getSideState(side);
          const dominance = clamp(state.whitePush - state.blackPush, -1, 1);

          // Eye is a stronger control anchor: it should follow deformation clearly.
          const baseY = anchor.yNorm * R;
          const outwardBiasY = (isTop ? -1 : 1) * Math.abs(dominance) * 0.15 * R;
          const liftBiasY = sideState.lift * 0.11 * R;
          const focusBiasY = (clamp(sideState.focusY, -1, 1) - anchor.yNorm) * 0.22 * R;
          const localYBias = sideState.localShiftY * 0.12 * R;
          const preferredYRaw = clamp(
            baseY + outwardBiasY + liftBiasY + focusBiasY + localYBias,
            isTop ? -0.95 * R : 0.32 * R,
            isTop ? -0.32 * R : 0.95 * R
          );
          const preferredY = getEyeFeatureSafeY(preferredYRaw, isTop, R);

          const span = hostSpanAtY(preferredY, R, side, dividerPoints, padding);
          const outerAtY = isTop ? span.minX : span.maxX;
          const dividerAtY = span.divider;

          // Preserve relative depth from divider->outer rim using neutral layout as baseline.
          const neutralOuterNorm = Math.sqrt(Math.max(1e-6, 1 - anchor.yNorm * anchor.yNorm));
          const neutralDividerNorm = sampleProfile(dividerProfile, anchor.yNorm);
          let depth;
          if (isTop) {
            depth =
              (anchor.xNorm - neutralDividerNorm) /
              Math.max(1e-6, -neutralOuterNorm - neutralDividerNorm);
          } else {
            depth =
              (anchor.xNorm - neutralDividerNorm) /
              Math.max(1e-6, neutralOuterNorm - neutralDividerNorm);
          }
          depth = clamp(depth, 0.14, 0.9);

          const localBias = sideState.localShiftX * 0.035;
          const depthWithBias = clamp(depth + (isTop ? localBias : -localBias), 0.14, 0.9);
          const xFromDepth = dividerAtY + (outerAtY - dividerAtY) * depthWithBias;
          const preferredX = clamp(xFromDepth, span.minX, span.maxX);

          const baseRadius = R * EYE_ANCHORS[key].radiusScale;
          const room = getEyeRoomAt(preferredX, preferredY, R, isTop, padding, dividerPoints);
          const maxAllowed = Math.min(room * 0.92, R * 0.22);
          const minAllowed = Math.min(R * 0.03, maxAllowed);

          return {
            x: preferredX,
            y: preferredY,
            r: maxAllowed > 0 ? clamp(baseRadius, minAllowed, maxAllowed) : Math.max(0.35, baseRadius),
          };
        }

        function getSideState(side) {
          if (side === "white") {
            return {
              push: (state.whitePush - 0.5) * 2,
              lift: state.whiteLift,
              localShiftX: state.whiteLocalShiftX,
              localShiftY: state.whiteLocalShiftY,
              focusY: state.whiteFocusY,
            };
          }
          return {
            push: (state.blackPush - 0.5) * 2,
            lift: state.blackLift,
            localShiftX: state.blackLocalShiftX,
            localShiftY: state.blackLocalShiftY,
            focusY: state.blackFocusY,
          };
        }

        function getFeatureWarpOffset(u, v, side, R) {
          const s = getSideState(side);
          const focus = gaussian(v, clamp(s.focusY, -1, 1), 0.35);
          const eye = gaussian(v, -0.52, 0.16);
          const nose = gaussian(v, -0.03, 0.16);
          const mouth = gaussian(v, 0.28, 0.2);
          const center = gaussian(v, 0.02, 0.18);
          const edge = clamp(1 - u, 0, 1);

          const dominance = clamp(state.whitePush - state.blackPush, -1, 1);
          const sideDominance = side === "white" ? dominance : -dominance;

          let dx =
            (sideDominance * (0.028 + edge * 0.02) +
              s.localShiftX * focus * 0.08 +
              s.push * center * 0.04 +
              s.lift * nose * 0.018) *
            R;

          let dy =
            (s.lift * (0.07 + edge * 0.05) +
              s.localShiftX * center * 0.02 +
              s.localShiftY * focus * 0.07 +
              s.push * (mouth * 0.018 - eye * 0.014)) *
            R;

          const maxMag = 0.15 * R;
          const mag = Math.hypot(dx, dy);
          if (mag > maxMag && mag > 1e-6) {
            const scale = maxMag / mag;
            dx *= scale;
            dy *= scale;
          }

          return { x: dx, y: dy };
        }

        function mapUVPoint(point, side, geometryState) {
          const u = clamp(point.u, 0.001, 0.999);
          const v = clamp(point.v, -0.98, 0.98);

          const y0 = v * geometryState.R;
          const span = hostSpanAtY(
            y0,
            geometryState.R,
            side,
            geometryState.dividerPoints,
            geometryState.featurePad
          );

          const outer = side === "white" ? span.minX : span.maxX;
          const x0 = span.divider + (outer - span.divider) * u;

          const warp = getFeatureWarpOffset(u, v, side, geometryState.R);
          const x = x0 + warp.x;
          const y = span.y + warp.y;

          return constrainPointToHost(
            x,
            y,
            geometryState.R,
            side,
            geometryState.dividerPoints,
            geometryState.featurePad
          );
        }

        function sampleCubicUV(p0, p1, p2, p3, steps) {
          const points = [];
          for (let i = 0; i <= steps; i += 1) {
            const t = i / steps;
            const inv = 1 - t;
            points.push({
              u:
                inv * inv * inv * p0.u +
                3 * inv * inv * t * p1.u +
                3 * inv * t * t * p2.u +
                t * t * t * p3.u,
              v:
                inv * inv * inv * p0.v +
                3 * inv * inv * t * p1.v +
                3 * inv * t * t * p2.v +
                t * t * t * p3.v,
            });
          }
          return points;
        }

        function sampleEllipseUV(cu, cv, ru, rv, steps) {
          const points = [];
          for (let i = 0; i < steps; i += 1) {
            const t = (i / steps) * TAU;
            points.push({
              u: cu + Math.cos(t) * ru,
              v: cv + Math.sin(t) * rv,
            });
          }
          return points;
        }

        function sampleCubicNorm(p0, p1, p2, p3, steps) {
          const points = [];
          for (let i = 0; i <= steps; i += 1) {
            const t = i / steps;
            const inv = 1 - t;
            points.push({
              x:
                inv * inv * inv * p0.x +
                3 * inv * inv * t * p1.x +
                3 * inv * t * t * p2.x +
                t * t * t * p3.x,
              y:
                inv * inv * inv * p0.y +
                3 * inv * inv * t * p1.y +
                3 * inv * t * t * p2.y +
                t * t * t * p3.y,
            });
          }
          return points;
        }

        function sampleEllipseNorm(cx, cy, rx, ry, steps) {
          const points = [];
          for (let i = 0; i < steps; i += 1) {
            const t = (i / steps) * TAU;
            points.push({
              x: cx + Math.cos(t) * rx,
              y: cy + Math.sin(t) * ry,
            });
          }
          return points;
        }

        function smoothPoints(points, passes, closed) {
          if (!points || points.length < 3 || passes <= 0) return points;
          let current = points.map((p) => ({ x: p.x, y: p.y }));
          const n = current.length;

          for (let pass = 0; pass < passes; pass += 1) {
            const next = new Array(n);
            for (let i = 0; i < n; i += 1) {
              if (!closed && (i === 0 || i === n - 1)) {
                next[i] = { x: current[i].x, y: current[i].y };
                continue;
              }
              const prev = current[(i - 1 + n) % n];
              const curr = current[i];
              const nxt = current[(i + 1) % n];
              next[i] = {
                x: (prev.x + 2 * curr.x + nxt.x) * 0.25,
                y: (prev.y + 2 * curr.y + nxt.y) * 0.25,
              };
            }
            current = next;
          }

          return current;
        }

        function traceSmoothPolyline(points, closed) {
          if (!points || points.length < 2) return;

          if (closed) {
            const n = points.length;
            const start = {
              x: (points[n - 1].x + points[0].x) * 0.5,
              y: (points[n - 1].y + points[0].y) * 0.5,
            };
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            for (let i = 0; i < n; i += 1) {
              const curr = points[i];
              const next = points[(i + 1) % n];
              const mid = { x: (curr.x + next.x) * 0.5, y: (curr.y + next.y) * 0.5 };
              ctx.quadraticCurveTo(curr.x, curr.y, mid.x, mid.y);
            }
            ctx.closePath();
            return;
          }

          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length - 1; i += 1) {
            const curr = points[i];
            const next = points[i + 1];
            const mid = { x: (curr.x + next.x) * 0.5, y: (curr.y + next.y) * 0.5 };
            ctx.quadraticCurveTo(curr.x, curr.y, mid.x, mid.y);
          }
          const last = points[points.length - 1];
          ctx.lineTo(last.x, last.y);
        }

        function getEyeBridgeRotation(key, eye, geometryState) {
          const R = geometryState.R;
          const isTop = key === "top";
          const probeY = clamp(
            eye.y + (isTop ? 0.24 : -0.24) * R,
            -0.36 * R,
            0.36 * R
          );
