
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Moody Faces</title>
    <link rel="icon" type="image/svg+xml" href="./icons/moody-faces-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/moody-faces-icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/moody-faces-icon-180.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <style>
      :root {
        --bg: #a87444;
        --black: #64418e;
        --white: #ff6699;
        --line: #231f20;
        --face-blurb-gap: clamp(12px, 2.2vh, 22px);
        --text-subtle: rgba(73, 45, 23, 0.72);
        --condensed:
          "Futura-CondensedExtraBold", "Futura Condensed", "Avenir Next Condensed",
          "Arial Narrow", "Roboto Condensed", "Impact", sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        min-height: 100svh;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      .app {
        width: min(96vw, 980px);
        height: 100svh;
        height: 100dvh;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(8px, 1.5vh, 16px);
        padding: calc(6px + env(safe-area-inset-top)) 0 calc(4px + env(safe-area-inset-bottom));
        box-sizing: border-box;
        overflow: hidden;
      }

      .symbol-stage {
        width: min(84vw, 62svh, 760px);
        position: relative;
        margin-top: 0;
      }

      .wrap {
        width: 100%;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
      }

      .date-stamp {
        position: absolute;
        z-index: 2;
        font-family: var(--condensed);
        font-size: clamp(14px, 2.8vmin, 30px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.028em;
        text-transform: uppercase;
        user-select: none;
        pointer-events: none;
        display: none;
      }

      .date-top {
        top: -3.6%;
        right: -2.8%;
        color: rgba(255, 255, 255, 0.96);
      }

      .date-bottom {
        bottom: -3.6%;
        left: -2.8%;
        transform: rotate(180deg);
        transform-origin: center;
        color: rgba(0, 0, 0, 0.94);
      }

      .meta {
        width: min(94vw, 760px);
        display: grid;
        justify-items: center;
        gap: 4px;
        margin-top: var(--face-blurb-gap);
        margin-bottom: 0;
      }

      .balance-meter {
        width: min(62vw, 280px);
        display: grid;
        justify-items: center;
        gap: 2px;
        margin-top: var(--face-blurb-gap);
        margin-bottom: clamp(6px, 1.4vh, 14px);
      }

      .balance-track {
        width: min(36vw, 220px);
        height: 10px;
        border: 1.25px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        display: flex;
        background: var(--black);
        touch-action: none;
        user-select: none;
        cursor: ew-resize;
      }

      .balance-fill-negative {
        background: var(--black);
        height: 100%;
        flex: 0 0 auto;
      }

      .balance-fill-positive {
        background: var(--white);
        height: 100%;
        flex: 0 0 auto;
      }

      .balance-label-row {
        width: min(36vw, 220px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .balance-label {
        font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        font-size: clamp(10px, 1.1vmin, 12px);
        line-height: 1;
        font-weight: 700;
        color: #000000;
        letter-spacing: 0.005em;
      }

      .instruction {
        margin: 0;
        max-width: 68ch;
        text-align: center;
        font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        font-size: clamp(14px, 1.2vw, 16px);
        line-height: 1.2;
        letter-spacing: 0.01em;
        color: #000000;
      }

      .button-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
      }

      .shot-btn {
        border: 1.25px solid #000000;
        background: transparent;
        color: #000000;
        border-radius: 999px;
        padding: 3px 10px;
        font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        font-size: clamp(10px, 1.02vw, 11px);
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.2;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        transition: background-color 120ms ease, color 120ms ease, border-color 120ms ease;
      }

      .shot-btn:hover {
        background: rgba(0, 0, 0, 0.06);
      }

      .shot-btn:active {
        background: rgba(0, 0, 0, 0.12);
        color: #000000;
        border-color: #000000;
      }

      .shot-btn.is-saving {
        opacity: 0.75;
        background: rgba(0, 0, 0, 0.12);
        color: #000000;
        border-color: #000000;
      }

      .save-status {
        min-height: 1em;
        margin: 0;
        font-size: clamp(9px, 0.92vw, 10px);
        color: rgba(73, 45, 23, 0.38);
      }

      #yy {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
        shape-rendering: geometricPrecision;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      @media (max-width: 760px) {
        .app {
          position: relative;
          width: 100vw;
          gap: 10px;
          justify-content: center;
          padding-left: 20px;
          padding-right: 20px;
          padding-top: calc(6px + env(safe-area-inset-top));
          padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .symbol-stage {
          width: min(100%, 56svh, 620px);
          margin-top: 0;
        }

        .balance-meter {
          width: min(calc((100vw - 40px) * 0.68), 240px);
          gap: 3px;
          margin-top: clamp(10px, 2.2vh, 18px);
          margin-bottom: clamp(10px, 2vh, 18px);
        }

        .balance-track {
          width: min(calc((100vw - 40px) * 0.54), 180px);
          height: 9px;
        }

        .balance-label-row {
          width: min(calc((100vw - 40px) * 0.54), 180px);
        }

        .balance-label {
          font-size: clamp(9px, 1.8vmin, 11px);
        }

        .date-stamp {
          font-size: clamp(18px, 4.1vmin, 28px);
        }

        .date-top {
          top: -5.4%;
          right: -2.4%;
        }

        .date-bottom {
          bottom: -5.4%;
          left: -2.4%;
        }

        .meta {
          position: absolute;
          left: 0;
          right: 0;
          transform: none;
          bottom: calc(2px + env(safe-area-inset-bottom));
          width: 100%;
          gap: 3px;
          margin: 0;
        }

        .instruction {
          font-size: clamp(12px, 2.5vw, 14px);
          color: #000000;
          max-width: 100%;
          white-space: normal;
        }

        .shot-btn {
          font-size: clamp(8px, 2.45vw, 11px);
          color: #000000;
          border-color: #000000;
          padding: 3px 11px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="symbol-stage" aria-label="Rubber-sheet face symbol">
        <div class="date-stamp date-top" id="dateTop"></div>
        <section class="wrap">
          <svg
            id="yy"
            aria-label="Interactive rubber face symbol"
            viewBox="0 0 540.72 540.72"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
        </section>
        <div class="date-stamp date-bottom" id="dateBottom"></div>
      </section>

      <section class="meta">
        <p class="instruction">drag and manipulate the faces to express your current mood</p>
        <p class="instruction">notice the balance of light and dark within you today</p>
        <p class="instruction">take a screenshot to capture this timestamped self portrait</p>
        <section class="balance-meter" aria-label="Mood balance slider">
          <div
            class="balance-track"
            id="balanceTrack"
            role="slider"
            aria-label="Negativity to positivity"
            aria-valuemin="1"
            aria-valuemax="99"
            aria-valuenow="50"
          >
            <div class="balance-fill-negative" id="balanceNegFill"></div>
            <div class="balance-fill-positive" id="balancePosFill"></div>
          </div>
          <div class="balance-label-row">
            <span class="balance-label" id="balanceNegLabel">negativity 50%</span>
            <span class="balance-label" id="balancePosLabel">positivity 50%</span>
          </div>
        </section>
        <div class="button-row">
          <button class="shot-btn" id="resetSymbol" type="button">reset</button>
          <button class="shot-btn" id="saveShot" type="button">screenshot</button>
          <button class="shot-btn" id="cycleColors" type="button">colors</button>
        </div>
        <p class="save-status" id="saveStatus" aria-live="polite"></p>
      </section>
    </main>

    <script>
      (() => {
        const SVG_NS = "http://www.w3.org/2000/svg";
        const TAU = Math.PI * 2;
        const VIEWBOX_SIZE = 540.72;
        const HALF = VIEWBOX_SIZE * 0.5;
        const BASE_SYMBOL_SCALE = 1.0;
        const STROKE_WIDTH = 4;
        const OUTER_RING_WIDTH = 5;
        const RING_EDGE_INSET = 1.0;
        const HARD_RIM_LOCK_START = 0.84;
        const HARD_RIM_LOCK_END = 0.97;
        const BORDER_POINT_LOCK_START = 0.9;
        const BORDER_POINT_LOCK_END = 0.985;
        const BORDER_POINT_FREEZE_START = 1.01;
        const DRAG_ACTIVATE_VIEWBOX = 2.8;
        const ROTATE_EPSILON = 0.045;
        const ROTATION_SPEED = 14.0; // rotational response (higher = faster)
        const ROTATION_DT_MIN = 1 / 240;
        const ROTATION_DT_MAX = 1 / 30;
        const ROTATION_SNAP_EPSILON = 8e-4;
        const FIELD_SIZE = 58;
        const FIELD_SIGMA = VIEWBOX_SIZE * 0.29;
        const FIELD_RELAX = 0.12;
        const FIELD_RELAX_PASSES = 1;
        const FIELD_GRADIENT_PASSES = 1;
        const FIELD_NEIGHBOR_MAX_FACTOR = 0.76;
        const FIELD_MAX_DISPLACE = HALF * 1.22;
        const MAX_PULL_STEP = VIEWBOX_SIZE * 0.06;
        const BALANCE_MIN = 0.01;
        const BALANCE_MAX = 0.99;
        const BALANCE_SHIFT_MAX = VIEWBOX_SIZE * 0.43;
        const BALANCE_MEASURE_SIZE = 160;
        const BALANCE_MEASURE_INTERVAL_MS = 70;
        const BALANCE_UI_EPSILON = 6e-4;
        const BALANCE_READBACK_DEADBAND = 0.003;
        const BALANCE_READBACK_FOLLOW = 0.22;
        const EYE_LOGIC_BASE_LEGIBILITY = 0.34;
        const EYE_LOGIC_SEAM_BAND = VIEWBOX_SIZE * 0.11;
        const EYE_LOGIC_SEAM_BOOST = 0.16;
        const EYE_LOGIC_DISTANCE_STIFFNESS = 0.82;
        const EYE_LOGIC_ROTATION_FOLLOW = 0.76;
        const EYE_LOGIC_SCALE_FOLLOW = 0.2;
        const EYE_LOGIC_MIN_SCALE = 0.74;
        const EYE_LOGIC_MAX_SCALE = 1.24;
        const EYE_LOGIC_SEAM_GUARD = STROKE_WIDTH * 0.9;
        const FACE_PART_BASE_PRESERVE = 0.03;
        const FACE_PART_FEATURE_BOOST = 0.1;
        const FACE_PART_FEATURE_RADIUS = VIEWBOX_SIZE * 0.18;
        const FACE_PART_FEATURES = Object.freeze([
          { x: 352, y: 198 }, // positive nose
          { x: 340, y: 264 }, // positive upper lip
          { x: 300, y: 302 }, // positive lower lip/chin
          { x: 184, y: 338 }, // negative nose
          { x: 202, y: 276 }, // negative upper lip
          { x: 246, y: 316 }, // negative lower lip/chin
        ]);
        const EYE_LOGIC_MODEL = Object.freeze({
          topEye: {
            center: { x: 205, y: 109.5 },
            bridge: { x: HALF, y: 171 },
            side: "left",
          },
          bottomEye: {
            center: { x: 2 * HALF - 205, y: 2 * HALF - 109.5 },
            bridge: { x: HALF, y: 2 * HALF - 171 },
            side: "right",
          },
        });
        const RIM_LOCK_START = 0.72;
        const RIM_LOCK_END = 0.96;
        const ORIENTATION_ANGLE = Object.freeze({
          positive: 0,
          negative: Math.PI,
        });

        const svg = document.getElementById("yy");
        const dateTop = document.getElementById("dateTop");
        const dateBottom = document.getElementById("dateBottom");
        const saveShotButton = document.getElementById("saveShot");
        const resetSymbolButton = document.getElementById("resetSymbol");
        const cycleColorsButton = document.getElementById("cycleColors");
        const saveStatus = document.getElementById("saveStatus");
        const balanceTrack = document.getElementById("balanceTrack");
        const balanceNegFill = document.getElementById("balanceNegFill");
        const balancePosFill = document.getElementById("balancePosFill");
        const balanceNegLabel = document.getElementById("balanceNegLabel");
        const balancePosLabel = document.getElementById("balancePosLabel");

        const rootStyles = getComputedStyle(document.documentElement);
        const COLORS = {
          bg: rootStyles.getPropertyValue("--bg").trim() || "#a87444",
          black: rootStyles.getPropertyValue("--black").trim() || "#64418e",
          white: rootStyles.getPropertyValue("--white").trim() || "#ff6699",
          line: rootStyles.getPropertyValue("--line").trim() || "#231f20",
        };
        const PALETTES = [
          { positive: COLORS.white, negative: COLORS.black },
          { positive: "#ec5b32", negative: "#aab845" },
          { positive: "#66a4cc", negative: "#5f94e5" },
          { positive: "#000000", negative: "#ffffff" },
          { positive: "#ffffff", negative: "#000000" },
        ];
        let paletteIndex = 0;

        const CONDENSED_FONT_STACK =
          '"Futura-CondensedExtraBold","Futura Condensed","Avenir Next Condensed","Arial Narrow","Roboto Condensed","Impact",sans-serif';
        const isIOSLike =
          /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        const FACE_PATHS = Object.freeze([
          {
            key: "positiveFace",
            cls: "cls-3",
            d: "M266.76,0l-.5,92.1-.15,59.13c26.68-9.61,52.18-17.95,80.25-19.3,9.8-.21,18.98,1.04,27.85,4.71,11.83,4.89,19.52,15.53,20.13,28.41,1.3,27.38-12.11,50.61-33.57,66.62-26.2,17.84-62.76,24.9-94.2,19.39l-.64,40.14-.25,24.05c-36.84,1.7-68.67-2.98-101.56-19.76-6.62-3.38-12.68-6.92-19.03-10.72-2.2-1.32-3.81-3.11-6.51-4.24,4.46,18.29,10.46,35.37,17.92,52.35,5.06,11.51,10.86,22.14,17.69,32.57,4.04,6.16,9.17,10.83,15.63,14.29,20.47,10.97,52.78,19.47,76.06,25.29.59,11.05.25,21.73.31,32.89l.58,102.77h-10.07c.04-.41-.46-.4-.91-.55C119.51,532.87,8.69,424,.91,286.17c.02.3.11-9.28-.91-9.81v-12.95c.5-3.36.75-6.18.9-8.82C8.61,118.15,117.55,9.11,253.7.65c3.33-.21,7.36.22,11.14-.65h1.92ZM216.67,106.73c-.49-5.25-2.61-9.8-6.15-13.55-4.16-4.39-10.74-4.29-14.78.46-7.86,9.24-7.58,22.99.3,32.23,2.06,2.42,4.64,3.74,7.62,3.69,9.61-.16,13.82-14.1,13.01-22.83Z",
          },
          {
            key: "negativeFace",
            cls: "cls-2",
            d: "M274.92,0c-.22.92,6,.25,8.56.6.8.11,1.56.62,2-.12,137.39,7.78,247.45,117.3,254.77,254.77l.02,10.05c0,.33.27.56.46.5v9.12c-.15-.06-.5.18-.5.5l.02,10.05c0,2.71-.21,5.27-.39,7.45-10.88,132.39-117.29,237.59-249.81,246.92-2.87.2-6.2.67-9.89.34-.71-.06-1.7-.05-1.88.54h-11.52l-.58-102.77c-.06-11.17.28-21.85-.31-32.89-23.29-5.83-55.59-14.32-76.06-25.29-6.46-3.46-11.59-8.13-15.63-14.29-6.84-10.43-12.63-21.06-17.69-32.57-7.46-16.98-13.46-34.06-17.92-52.35,2.71,1.12,4.31,2.92,6.51,4.24,6.35,3.8,12.41,7.34,19.03,10.72,32.89,16.78,64.72,21.46,101.56,19.76l.25-24.05.64-40.14c31.44,5.51,68-1.55,94.2-19.39,21.46-16.01,34.87-39.24,33.57-66.62-.61-12.88-8.31-23.52-20.13-28.41-8.87-3.67-18.05-4.92-27.85-4.71-28.07,1.34-53.57,9.69-80.25,19.3l.15-59.13.5-92.1h8.16ZM322.17,468.78c4.13,3.8,10.22,3.38,13.97-.82,8.55-9.58,8.06-24.72-1.1-33.88-4.28-4.28-11.1-3.18-14.64,1.52-7.08,9.4-7.65,24.52,1.77,33.17Z",
          },
          {
            key: "positiveSeamTop",
            cls: "cls-3",
            d: "M285.47,0v.48c-.43.74-1.2.23-2,.12-2.56-.35-8.78.32-8.56-.6h10.56Z",
          },
          {
            key: "positiveSeamRightA",
            cls: "cls-3",
            d: "M540.72,265.8c-.19.06-.46-.17-.46-.5l-.02-10.05h.48v10.56Z",
          },
          {
            key: "positiveSeamRightB",
            cls: "cls-3",
            d: "M540.72,285.47h-.48l-.02-10.05c0-.33.35-.56.5-.5v10.56Z",
          },
          {
            key: "topEye",
            cls: "cls-2",
            d: "M216.67,106.73c.81,8.73-3.39,22.67-13.01,22.83-2.99.05-5.56-1.27-7.62-3.69-7.88-9.24-8.16-22.99-.3-32.23,4.04-4.74,10.62-4.85,14.78-.46,3.55,3.75,5.67,8.29,6.15,13.55Z",
          },
          {
            key: "bottomEye",
            cls: "cls-3",
            d: "M322.17,468.78c-9.42-8.66-8.85-23.78-1.77-33.17,3.54-4.7,10.36-5.8,14.64-1.52,9.16,9.16,9.65,24.29,1.1,33.88-3.75,4.2-9.84,4.62-13.97.82Z",
          },
        ]);

        const LEGACY_SEAM_KEYS = new Set([
          "positiveSeamTop",
          "positiveSeamRightA",
          "positiveSeamRightB",
        ]);
        const rawPathModels = FACE_PATHS.filter((def) => !LEGACY_SEAM_KEYS.has(def.key)).map((def) => {
          const parsed = parsePathDataToAbsolute(def.d);
          const commands =
            def.key === "positiveFace" || def.key === "negativeFace"
              ? takePrimarySubpath(parsed)
              : parsed;
          return {
            ...def,
            commands,
          };
        });
        const topEyeModelForMirror = rawPathModels.find((model) => model.key === "topEye");
        const pathModels = rawPathModels.map((model) => {
          if (model.key !== "bottomEye" || !topEyeModelForMirror) {
            return model;
          }
          return {
            ...model,
            commands: rotateCommands180(topEyeModelForMirror.commands),
          };
        });

        const saveState = {
          isSaving: false,
          statusTimeout: 0,
        };
        const balanceState = {
          value: 0.5,
          displayValue: 0.5,
          dragging: false,
          pointerId: null,
        };

        const drag = {
          active: false,
          pointerId: null,
          start: { x: 0, y: 0 },
          last: { x: 0, y: 0 },
          distance: 0,
          pendingRotation: false,
        };

        const viewRotation = {
          current: 0,
          target: 0,
        };
        const initialSide = Math.random() < 0.5 ? "positive" : "negative";
        viewRotation.current = ORIENTATION_ANGLE[initialSide];
        viewRotation.target = viewRotation.current;

        const field = {
          size: FIELD_SIZE,
          axis: new Float32Array(FIELD_SIZE),
          dx: new Float32Array(FIELD_SIZE * FIELD_SIZE),
          dy: new Float32Array(FIELD_SIZE * FIELD_SIZE),
          tx: new Float32Array(FIELD_SIZE * FIELD_SIZE),
          ty: new Float32Array(FIELD_SIZE * FIELD_SIZE),
        };
        for (let i = 0; i < FIELD_SIZE; i += 1) {
          field.axis[i] = (i / (FIELD_SIZE - 1)) * VIEWBOX_SIZE;
        }

        const dom = {
          symbolGroup: null,
          pathEls: new Map(),
          clipPositivePath: null,
          clipNegativePath: null,
          clipPositive: null,
          clipNegative: null,
          seamPositiveInNegative: null,
          seamNegativeInPositive: null,
          outerRing: null,
          basePositive: null,
          baseNegative: null,
        };

        const runtime = {
          requestId: 0,
          matrix: getSymbolMatrix(viewRotation.current),
          lastFrameMs: 0,
          hitPositive: null,
          hitNegative: null,
          hitCtx: document.createElement("canvas").getContext("2d"),
          balanceCanvas: document.createElement("canvas"),
          balanceCtx: null,
          balancePositiveRgb: { r: 255, g: 102, b: 153 },
          balanceNegativeRgb: { r: 100, g: 65, b: 142 },
          lastBalanceMeasureMs: 0,
          balanceReadbackEnabled: false,
          eyeTransforms: {},
        };
        runtime.balanceCanvas.width = BALANCE_MEASURE_SIZE;
        runtime.balanceCanvas.height = BALANCE_MEASURE_SIZE;
        runtime.balanceCtx = runtime.balanceCanvas.getContext("2d", { willReadFrequently: true });
        runtime.balancePositiveRgb = parseColorToRgb(COLORS.white, runtime.balancePositiveRgb);
        runtime.balanceNegativeRgb = parseColorToRgb(COLORS.black, runtime.balanceNegativeRgb);

        function clamp(n, min, max) {
          return Math.min(max, Math.max(min, n));
        }

        function parseColorToRgb(color, fallback) {
          if (typeof color !== "string") return fallback;
          const input = color.trim();
          const hex = input.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);

            const value = hex[1];
            if (value.length === 3) {

                g: parseInt(value[1] + value[1], 16),
                b: parseInt(value[2] + value[2], 16),
              };

              r: parseInt(value.slice(0, 2), 16),
              g: parseInt(value.slice(2, 4), 16),
              b: parseInt(value.slice(4, 6), 16),
            };

            /^rgba?\(\s*([-+]?\d*\.?\d+)\s*,\s*([-+]?\d*\.?\d+)\s*,\s*([-+]?\d*\.?\d+)/i

            return {
              r: clamp(Math.round(Number(rgb[1])), 0, 255),
              g: clamp(Math.round(Number(rgb[2])), 0, 255),

          const c = -BASE_SYMBOL_SCALE * sin;
          const d = BASE_SYMBOL_SCALE * cos;
          const e = HALF - a * HALF - c * HALF;
          const f = HALF - b * HALF - d * HALF;
          const det = a * d - b * c;

          return {

            y: HALF + dy * s,

          if (balancePosFill) {

          COLORS.black = swatch.negative;

          document.documentElement.style.setProperty("--black", COLORS.black);

          runtime.balanceNegativeRgb = parseColorToRgb(COLORS.black, runtime.balanceNegativeRgb);

          if (dom.baseNegative) {

        function parsePathDataToAbsolute(d) {
          const tokens = d.match(/[a-zA-Z]|[-+]?(?:\d*\.\d+|\d+)(?:[eE][-+]?\d+)?/g);
          if (!tokens || tokens.length === 0) return [];

          const out = [];
          let i = 0;
          let cmd = "";
          let x = 0;
          let y = 0;
          let startX = 0;
          let startY = 0;

          const isCommand = (token) => /^[a-zA-Z]$/.test(token);
          const hasNumber = () => i < tokens.length && !isCommand(tokens[i]);
          const readNumber = () => Number(tokens[i++]);

          while (i < tokens.length) {
            if (isCommand(tokens[i])) {
              cmd = tokens[i++];
            }
            if (!cmd) break;

            const lower = cmd.toLowerCase();
            const relative = cmd === lower;

            if (lower === "z") {
              out.push({ type: "Z" });
              x = startX;
              y = startY;
              continue;
            }

            if (lower === "m") {
              let first = true;
              while (hasNumber()) {
                let nx = readNumber();
                let ny = readNumber();
                if (relative) {
                  nx += x;
                  ny += y;
                }
                if (first) {
                  out.push({ type: "M", x: nx, y: ny });
                  startX = nx;
                  startY = ny;
                  first = false;
                } else {
                  out.push({ type: "L", x: nx, y: ny });
                }
                x = nx;
                y = ny;
              }
              continue;
            }

            if (lower === "l") {
              while (hasNumber()) {
                let nx = readNumber();
                let ny = readNumber();
                if (relative) {
                  nx += x;
                  ny += y;
                }
                out.push({ type: "L", x: nx, y: ny });
                x = nx;
                y = ny;
              }
              continue;
            }

            if (lower === "h") {
              while (hasNumber()) {
                let nx = readNumber();
                if (relative) nx += x;
                out.push({ type: "L", x: nx, y });
                x = nx;
              }
              continue;
            }

            if (lower === "v") {
              while (hasNumber()) {
                let ny = readNumber();
                if (relative) ny += y;
                out.push({ type: "L", x, y: ny });
                y = ny;
              }
              continue;
            }

            if (lower === "c") {
              while (hasNumber()) {
                let x1 = readNumber();
                let y1 = readNumber();
                let x2 = readNumber();
                let y2 = readNumber();
                let nx = readNumber();
                let ny = readNumber();
                if (relative) {
                  x1 += x;
                  y1 += y;
                  x2 += x;
                  y2 += y;
                  nx += x;
                  ny += y;
                }
                out.push({ type: "C", x1, y1, x2, y2, x: nx, y: ny });

                y = ny;

              started = true;
              primary.push(cmd);
              continue;

            if (!started) continue;
            primary.push(cmd);
            if (cmd.type === "Z") break;

                type: cmd.type,
                x: 2 * HALF - cmd.x,
                y: 2 * HALF - cmd.y,

            if (cmd.type === "C") {

                type: "C",
                x1: 2 * HALF - cmd.x1,
                y1: 2 * HALF - cmd.y1,
                x2: 2 * HALF - cmd.x2,
                y2: 2 * HALF - cmd.y2,
                x: 2 * HALF - cmd.x,
                y: 2 * HALF - cmd.y,

            }
            mirrored.push(cmd);

        function sampleField(x, y) {
          const size = field.size;
          const u = clamp((x / VIEWBOX_SIZE) * (size - 1), 0, size - 1);
          const v = clamp((y / VIEWBOX_SIZE) * (size - 1), 0, size - 1);
          const i0 = Math.floor(u);
          const j0 = Math.floor(v);
          const i1 = Math.min(size - 1, i0 + 1);
          const j1 = Math.min(size - 1, j0 + 1);
          const tx = u - i0;
          const ty = v - j0;

          const idx00 = j0 * size + i0;
          const idx10 = j0 * size + i1;
          const idx01 = j1 * size + i0;
          const idx11 = j1 * size + i1;

          const dx0 = field.dx[idx00] * (1 - tx) + field.dx[idx10] * tx;
          const dx1 = field.dx[idx01] * (1 - tx) + field.dx[idx11] * tx;
          const dy0 = field.dy[idx00] * (1 - tx) + field.dy[idx10] * tx;
          const dy1 = field.dy[idx01] * (1 - tx) + field.dy[idx11] * tx;

          return {
            x: dx0 * (1 - ty) + dx1 * ty,
            y: dy0 * (1 - ty) + dy1 * ty,
          };
        }

        function constrainField() {
          const size = field.size;
          for (let j = 0; j < size; j += 1) {
            const y = field.axis[j];
            for (let i = 0; i < size; i += 1) {
              const x = field.axis[i];
              const idx = j * size + i;

              const rNorm = Math.hypot(x - HALF, y - HALF) / HALF;
              const lock = smoothstep(RIM_LOCK_START, RIM_LOCK_END, rNorm);

              let dx = field.dx[idx] * (1 - lock * 0.9);
              let dy = field.dy[idx] * (1 - lock * 0.9);

              const mag = Math.hypot(dx, dy);
              const maxMag = FIELD_MAX_DISPLACE * (1 - lock * 0.78);
              if (mag > maxMag && mag > 1e-6) {
                const scale = maxMag / mag;
                dx *= scale;
                dy *= scale;
              }

              field.dx[idx] = dx;
              field.dy[idx] = dy;

        function relaxField() {
          const size = field.size;
          for (let pass = 0; pass < FIELD_RELAX_PASSES; pass += 1) {
            for (let j = 1; j < size - 1; j += 1) {
              for (let i = 1; i < size - 1; i += 1) {
                const idx = j * size + i;
                const avgX =
                  (field.dx[idx - 1] +
                    field.dx[idx + 1] +
                    field.dx[idx - size] +
                    field.dx[idx + size]) *
                  0.25;
                const avgY =
                  (field.dy[idx - 1] +
                    field.dy[idx + 1] +
                    field.dy[idx - size] +
                    field.dy[idx + size]) *
                  0.25;

                field.ty[idx] = field.dy[idx] * (1 - FIELD_RELAX) + avgY * FIELD_RELAX;

            for (let j = 1; j < size - 1; j += 1) {

                field.dy[idx] = field.ty[idx];
              }
            }
          }

        function limitFieldNeighborDelta() {
          const size = field.size;
          const cell = VIEWBOX_SIZE / Math.max(1, size - 1);
          const maxDelta = cell * FIELD_NEIGHBOR_MAX_FACTOR;

          const clampPair = (idxA, idxB) => {
            const ddx = field.dx[idxB] - field.dx[idxA];
            const ddy = field.dy[idxB] - field.dy[idxA];
            const dist = Math.hypot(ddx, ddy);
            if (dist <= maxDelta || dist <= 1e-9) return;
            const scale = maxDelta / dist;
            const mx = (field.dx[idxA] + field.dx[idxB]) * 0.5;
            const my = (field.dy[idxA] + field.dy[idxB]) * 0.5;
            const hx = (ddx * 0.5) * scale;
            const hy = (ddy * 0.5) * scale;
            field.dx[idxA] = mx - hx;
            field.dy[idxA] = my - hy;
            field.dx[idxB] = mx + hx;
            field.dy[idxB] = my + hy;
          };

          for (let pass = 0; pass < FIELD_GRADIENT_PASSES; pass += 1) {
            for (let j = 0; j < size; j += 1) {
              for (let i = 0; i < size - 1; i += 1) {
                const idxA = j * size + i;
                clampPair(idxA, idxA + 1);
              }
            }
            for (let j = 0; j < size - 1; j += 1) {
              for (let i = 0; i < size; i += 1) {
                const idxA = j * size + i;
                clampPair(idxA, idxA + size);
              }
            }

        function applyFieldPull(center, delta) {
          const size = field.size;
          const sigma2 = FIELD_SIGMA * FIELD_SIGMA;
          const invTwoSigma2 = 1 / Math.max(1e-9, 2 * sigma2);

          for (let j = 0; j < size; j += 1) {
            const y = field.axis[j];
            for (let i = 0; i < size; i += 1) {
              const x = field.axis[i];
              const idx = j * size + i;
              const dx = x - center.x;
              const dy = y - center.y;
              const w = Math.exp(-(dx * dx + dy * dy) * invTwoSigma2);
              const rim = smoothstep(
                RIM_LOCK_START,
                RIM_LOCK_END,
                Math.hypot(x - HALF, y - HALF) / HALF

              const atten = 1 - rim * 0.9;
              field.dx[idx] += delta.x * w * atten;
              field.dy[idx] += delta.y * w * atten;

          limitFieldNeighborDelta();
          constrainField();
          limitFieldNeighborDelta();
          constrainField();

        function warpPoint(x, y) {

          const rNorm = Math.hypot(x - HALF, y - HALF) / HALF;
          if (rNorm >= BORDER_POINT_FREEZE_START) {

          }
          const rimLock = smoothstep(RIM_LOCK_START, RIM_LOCK_END, rNorm);
          const guard = 1 - rimLock * 0.9;
          const balanceT = (balanceState.value - 0.5) * 2;
          const balanceDrive = Math.sign(balanceT) * Math.pow(Math.abs(balanceT), 1.35);
          const yNorm = Math.abs((y - HALF) / HALF);
          const verticalEnvelope = Math.pow(Math.max(0, 1 - yNorm), 0.42);
          const balanceGuard = 1 - rimLock * 0.94;
          const balanceShift = balanceDrive * BALANCE_SHIFT_MAX * verticalEnvelope * balanceGuard;
          let wx = x + disp.x * guard + balanceShift;
          let wy = y + disp.y * guard;

          const limit = HALF - OUTER_RING_WIDTH * 0.5 - RING_EDGE_INSET;
          const edgeLock = smoothstep(0.66, 0.89, rNorm);
          if (edgeLock > 0) {
            const ux = wx - HALF;
            const uy = wy - HALF;
            const ud = Math.hypot(ux, uy);
            if (ud > 1e-6) {
              const lockedX = HALF + (ux / ud) * limit;
              const lockedY = HALF + (uy / ud) * limit;
              wx = wx * (1 - edgeLock) + lockedX * edgeLock;
              wy = wy * (1 - edgeLock) + lockedY * edgeLock;
            }
          }

          const dx = wx - HALF;
          const dy = wy - HALF;
          const dist = Math.hypot(dx, dy);
          if (dist > limit && dist > 1e-6) {
            const scale = limit / dist;
            wx = HALF + dx * scale;
            wy = HALF + dy * scale;
          }

          // Hard-anchor near-rim points back toward their original radial position.
          const hardLock = smoothstep(HARD_RIM_LOCK_START, HARD_RIM_LOCK_END, rNorm);
          if (hardLock > 0) {
            let lx = x;
            let ly = y;
            const ldx = x - HALF;
            const ldy = y - HALF;
            const ldist = Math.hypot(ldx, ldy);
            if (ldist > 1e-6) {
              const radius = Math.min(ldist, limit);
              lx = HALF + (ldx / ldist) * radius;
              ly = HALF + (ldy / ldist) * radius;
            }
            wx = wx * (1 - hardLock) + lx * hardLock;
            wy = wy * (1 - hardLock) + ly * hardLock;
          }

          const fdx = wx - HALF;
          const fdy = wy - HALF;
          const fdist = Math.hypot(fdx, fdy);
          if (fdist > limit && fdist > 1e-6) {
            const fs = limit / fdist;
            wx = HALF + fdx * fs;
            wy = HALF + fdy * fs;
          }

          const borderLock = smoothstep(BORDER_POINT_LOCK_START, BORDER_POINT_LOCK_END, rNorm);
          if (borderLock > 0) {
            wx = wx * (1 - borderLock) + x * borderLock;
            wy = wy * (1 - borderLock) + y * borderLock;
          }

          return { x: wx, y: wy };
        }

        function applyFaceLegibility(modelKey, ox, oy, wx, wy) {
          const isEye = modelKey === "topEye" || modelKey === "bottomEye";
          const isFace = modelKey === "positiveFace" || modelKey === "negativeFace";
          if (!isEye && !isFace) {
            return { x: wx, y: wy };
          }

          if (isFace) {
            let maxInfluence = 0;
            for (let i = 0; i < FACE_PART_FEATURES.length; i += 1) {
              const f = FACE_PART_FEATURES[i];
              const dx = ox - f.x;
              const dy = oy - f.y;
              const d2 = dx * dx + dy * dy;
              const influence = Math.exp(
                -d2 / Math.max(1e-6, 2 * FACE_PART_FEATURE_RADIUS * FACE_PART_FEATURE_RADIUS)
              );
              if (influence > maxInfluence) maxInfluence = influence;
            }

            const preserve = clamp(
              FACE_PART_BASE_PRESERVE + maxInfluence * FACE_PART_FEATURE_BOOST,
              0,
              0.16
            );
            return {
              x: ox * preserve + wx * (1 - preserve),
              y: oy * preserve + wy * (1 - preserve),
            };
          }

          const seamDist = Math.abs(ox - HALF);
          const seamInfluence = clamp(1 - seamDist / Math.max(1e-6, EYE_LOGIC_SEAM_BAND), 0, 1);
          const preserve = clamp(
            EYE_LOGIC_BASE_LEGIBILITY + seamInfluence * EYE_LOGIC_SEAM_BOOST,
            0.28,
            0.9
          );

          const t = runtime.eyeTransforms[modelKey];
          if (!t) {
            return {
              x: ox * preserve + wx * (1 - preserve),
              y: oy * preserve + wy * (1 - preserve),
            };
          }

          const dx = ox - t.centerOrig.x;
          const dy = oy - t.centerOrig.y;
          const cos = Math.cos(t.angle);
          const sin = Math.sin(t.angle);
          const rigidX = t.center.x + (dx * cos - dy * sin) * t.scale;
          const rigidY = t.center.y + (dx * sin + dy * cos) * t.scale;

          return {
            x: wx * (1 - preserve) + rigidX * preserve,
            y: wy * (1 - preserve) + rigidY * preserve,
          };
        }

        function serializeWarpedPath(model, cache) {
          const commands = model.commands;
          if (!commands || commands.length === 0) {
            return model.d;
          }

          const parts = [];
          const warpCached = (x, y) => {
            const key = `${x},${y}`;
            if (cache.has(key)) return cache.get(key);
            const p = warpPoint(x, y);
            cache.set(key, p);
            return p;
          };

          for (let i = 0; i < commands.length; i += 1) {
            const cmd = commands[i];
            if (cmd.type === "M" || cmd.type === "L") {
              const warped = warpCached(cmd.x, cmd.y);
              const p = applyFaceLegibility(model.key, cmd.x, cmd.y, warped.x, warped.y);
              parts.push(`${cmd.type}${formatPathNumber(p.x)},${formatPathNumber(p.y)}`);
              continue;
            }
            if (cmd.type === "C") {
              const w1 = warpCached(cmd.x1, cmd.y1);
              const w2 = warpCached(cmd.x2, cmd.y2);
              const w = warpCached(cmd.x, cmd.y);
              const p1 = applyFaceLegibility(model.key, cmd.x1, cmd.y1, w1.x, w1.y);
              const p2 = applyFaceLegibility(model.key, cmd.x2, cmd.y2, w2.x, w2.y);
              const p = applyFaceLegibility(model.key, cmd.x, cmd.y, w.x, w.y);
              parts.push(
                `C${formatPathNumber(p1.x)},${formatPathNumber(p1.y)} ${formatPathNumber(
                  p2.x
                )},${formatPathNumber(p2.y)} ${formatPathNumber(p.x)},${formatPathNumber(p.y)}`
              );
              continue;
            }
            if (cmd.type === "Z") {
              parts.push("Z");
            }
          }

          return parts.join(" ");
        }

        function createPath2DIfAvailable(d) {
          if (typeof Path2D !== "function") return null;
          try {
            return new Path2D(d);
          } catch (_) {
            return null;
          }
        }

        function computeEyeTransform(eyeKey) {
          const cfg = EYE_LOGIC_MODEL[eyeKey];
          if (!cfg) return null;

          const centerOrig = cfg.center;
          const bridgeOrig = cfg.bridge;
          const warpedCenterRaw = warpPoint(centerOrig.x, centerOrig.y);
          const warpedBridge = warpPoint(bridgeOrig.x, bridgeOrig.y);

          const baseVecX = centerOrig.x - bridgeOrig.x;
          const baseVecY = centerOrig.y - bridgeOrig.y;
          const baseLen = Math.hypot(baseVecX, baseVecY);
          if (baseLen <= 1e-6) {
            return {
              centerOrig,
              center: warpedCenterRaw,
              angle: 0,
              scale: 1,
            };
          }

          const warpedVecX = warpedCenterRaw.x - warpedBridge.x;
          const warpedVecY = warpedCenterRaw.y - warpedBridge.y;
          const warpedLen = Math.hypot(warpedVecX, warpedVecY);
          let dirX = warpedVecX;
          let dirY = warpedVecY;
          if (warpedLen <= 1e-6) {
            dirX = baseVecX;
            dirY = baseVecY;
          }
          const dirLen = Math.hypot(dirX, dirY);
          const nx = dirLen > 1e-6 ? dirX / dirLen : baseVecX / baseLen;
          const ny = dirLen > 1e-6 ? dirY / dirLen : baseVecY / baseLen;

          const desiredDist =
            baseLen * EYE_LOGIC_DISTANCE_STIFFNESS + warpedLen * (1 - EYE_LOGIC_DISTANCE_STIFFNESS);
          let center = {
            x: warpedBridge.x + nx * desiredDist,
            y: warpedBridge.y + ny * desiredDist,
          };

          if (cfg.side === "left") {
            center.x = Math.min(center.x, HALF - EYE_LOGIC_SEAM_GUARD);
          } else {
            center.x = Math.max(center.x, HALF + EYE_LOGIC_SEAM_GUARD);
          }
          center = clampPointToCircle(center);

          const baseAngle = Math.atan2(baseVecY, baseVecX);
          const warpedAngle = Math.atan2(ny, nx);
          const angle = normalizeAngle((warpedAngle - baseAngle) * EYE_LOGIC_ROTATION_FOLLOW);
          const rawScale = warpedLen > 1e-6 ? warpedLen / baseLen : 1;
          const scale = clamp(
            1 + (rawScale - 1) * EYE_LOGIC_SCALE_FOLLOW,
            EYE_LOGIC_MIN_SCALE,
            EYE_LOGIC_MAX_SCALE
          );

          return {
            centerOrig,
            center,
            angle,
            scale,
          };
        }

        function updateWarpedPaths() {
          const cache = new Map();
          let positiveD = null;
          let negativeD = null;

          runtime.eyeTransforms = {};
          const eyeAnchorKeys = Object.keys(EYE_LOGIC_MODEL);
          for (let i = 0; i < eyeAnchorKeys.length; i += 1) {
            const key = eyeAnchorKeys[i];
            runtime.eyeTransforms[key] = computeEyeTransform(key);
          }

          for (let i = 0; i < pathModels.length; i += 1) {
            const model = pathModels[i];
            const d = serializeWarpedPath(model, cache);
            const elPair = dom.pathEls.get(model.key);
            if (elPair) {
              elPair.fill.setAttribute("d", d);
              elPair.stroke.setAttribute("d", d);
            }
            if (model.key === "positiveFace") positiveD = d;
            if (model.key === "negativeFace") negativeD = d;
          }

          if (positiveD && dom.clipPositivePath) {
            dom.clipPositivePath.setAttribute("d", positiveD);
          }
          if (negativeD && dom.clipNegativePath) {
            dom.clipNegativePath.setAttribute("d", negativeD);
          }
          if (positiveD && dom.seamPositiveInNegative) {
            dom.seamPositiveInNegative.setAttribute("d", positiveD);
          }
          if (negativeD && dom.seamNegativeInPositive) {
            dom.seamNegativeInPositive.setAttribute("d", negativeD);
          }

          runtime.hitPositive = positiveD ? createPath2DIfAvailable(positiveD) : null;
          runtime.hitNegative = negativeD ? createPath2DIfAvailable(negativeD) : null;
        }

        function computeMeasuredBalanceValue() {
          if (!runtime.balanceCtx || typeof Path2D !== "function") {
            return balanceState.displayValue;
          }

          const ctx = runtime.balanceCtx;
          const size = BALANCE_MEASURE_SIZE;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, size, size);

          const scale = size / VIEWBOX_SIZE;
          ctx.save();
          ctx.scale(scale, scale);
          ctx.beginPath();
          ctx.arc(HALF, HALF, HALF, 0, TAU);
          ctx.clip();

          const splitX = HALF;
          ctx.fillStyle = COLORS.white;
          ctx.fillRect(0, 0, splitX, VIEWBOX_SIZE);
          ctx.fillStyle = COLORS.black;
          ctx.fillRect(splitX, 0, VIEWBOX_SIZE - splitX, VIEWBOX_SIZE);

          for (let i = 0; i < pathModels.length; i += 1) {
            const model = pathModels[i];
            const pair = dom.pathEls.get(model.key);
            const d = pair?.fill?.getAttribute("d");
            if (!d) continue;
            ctx.fillStyle = getFillForClass(model.cls);
            const path = new Path2D(d);
            ctx.fill(path);
          }
          ctx.restore();

          const rgba = ctx.getImageData(0, 0, size, size).data;
          const pr = runtime.balancePositiveRgb.r;
          const pg = runtime.balancePositiveRgb.g;
          const pb = runtime.balancePositiveRgb.b;
          const nr = runtime.balanceNegativeRgb.r;
          const ng = runtime.balanceNegativeRgb.g;
          const nb = runtime.balanceNegativeRgb.b;

          let positiveCount = 0;
          let negativeCount = 0;
          for (let i = 0; i < rgba.length; i += 4) {
            const a = rgba[i + 3];
            if (a < 10) continue;
            const r = rgba[i];
            const g = rgba[i + 1];
            const b = rgba[i + 2];
            const dPos = (r - pr) * (r - pr) + (g - pg) * (g - pg) + (b - pb) * (b - pb);
            const dNeg = (r - nr) * (r - nr) + (g - ng) * (g - ng) + (b - nb) * (b - nb);
            if (dPos <= dNeg) {
              positiveCount += 1;
            } else {
              negativeCount += 1;
            }
          }

          const total = positiveCount + negativeCount;
          if (total <= 0) return balanceState.displayValue;
          return clampBalance(positiveCount / total);
        }

        function updateMeasuredBalanceUI(force = false) {
          if (balanceState.dragging) return;
          if (!runtime.balanceReadbackEnabled && !force) return;
          const nowMs = typeof performance !== "undefined" ? performance.now() : Date.now();
          if (!force && nowMs - runtime.lastBalanceMeasureMs < BALANCE_MEASURE_INTERVAL_MS) return;
          runtime.lastBalanceMeasureMs = nowMs;

          const measured = computeMeasuredBalanceValue();
          if (!Number.isFinite(measured)) return;
          const delta = measured - balanceState.displayValue;
          if (Math.abs(delta) <= BALANCE_READBACK_DEADBAND) return;

          balanceState.displayValue = clampBalance(
            balanceState.displayValue + delta * BALANCE_READBACK_FOLLOW
          );
          if (Math.abs(measured - balanceState.displayValue) <= BALANCE_UI_EPSILON) {
            balanceState.displayValue = measured;
          }
          updateBalanceUI();
        }

        function classifySideAtModelPoint(point) {
          if (runtime.hitCtx && runtime.hitPositive) {
            try {
              if (runtime.hitCtx.isPointInPath(runtime.hitPositive, point.x, point.y)) {
                return "positive";
              }
            } catch (_) {}
          }
          if (runtime.hitCtx && runtime.hitNegative) {
            try {
              if (runtime.hitCtx.isPointInPath(runtime.hitNegative, point.x, point.y)) {
                return "negative";
              }
            } catch (_) {}
          }
          return point.x < HALF ? "positive" : "negative";
        }

        function draw() {
          const nowMs = typeof performance !== "undefined" ? performance.now() : Date.now();
          const dt =
            runtime.lastFrameMs > 0 ? (nowMs - runtime.lastFrameMs) / 1000 : 1 / 60;
          runtime.lastFrameMs = nowMs;

          const rotating = easeViewRotationTowardTarget(dt);
          runtime.matrix = getSymbolMatrix(viewRotation.current);
          const matrix = matrixToTransform(runtime.matrix);
          dom.symbolGroup.setAttribute("transform", matrixToTransform(runtime.matrix));
          if (dom.clipPositive) {
            dom.clipPositive.setAttribute("clipPathTransform", matrix);
          }
          if (dom.clipNegative) {
            dom.clipNegative.setAttribute("clipPathTransform", matrix);
          }
          updateWarpedPaths();
          updateMeasuredBalanceUI();

          if (rotating) {
            requestDraw();
          }
        }

        function requestDraw() {
          if (runtime.requestId) return;
          runtime.requestId = requestAnimationFrame(() => {
            runtime.requestId = 0;
            draw();
          });
        }

        function formatDisplayDate(date = new Date()) {
          const parts = new Intl.DateTimeFormat("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          }).formatToParts(date);
          const month = (parts.find((part) => part.type === "month")?.value || "").toUpperCase();
          const day = parts.find((part) => part.type === "day")?.value || "";
          const year = parts.find((part) => part.type === "year")?.value || "";
          return `${month} ${day} ${year}`.trim();
        }

        function renderDateStamps() {
          const stamp = formatDisplayDate(new Date());
          dateTop.textContent = stamp;
          dateBottom.textContent = stamp;
        }
        renderDateStamps();
        window.setInterval(renderDateStamps, 60_000);

        function formatFilenameStamp(date = new Date()) {
          const year = String(date.getFullYear());
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");
          const hour = String(date.getHours()).padStart(2, "0");
          const minute = String(date.getMinutes()).padStart(2, "0");
          const second = String(date.getSeconds()).padStart(2, "0");
          return {
            date: `${year}-${month}-${day}`,
            time: `${hour}-${minute}-${second}`,
          };
        }

        function setSaveStatus(message) {
          saveStatus.textContent = message;
          if (saveState.statusTimeout) {
            clearTimeout(saveState.statusTimeout);
            saveState.statusTimeout = 0;
          }
          if (!message) return;
          saveState.statusTimeout = window.setTimeout(() => {
            saveStatus.textContent = "";
            saveState.statusTimeout = 0;
          }, 2600);
        }

        function resetSymbolState() {
          for (let i = 0; i < field.dx.length; i += 1) {
            field.dx[i] = 0;
            field.dy[i] = 0;
            field.tx[i] = 0;
            field.ty[i] = 0;
          }

          const toPositive = Math.abs(shortestAngleDelta(viewRotation.current, ORIENTATION_ANGLE.positive));
          const toNegative = Math.abs(shortestAngleDelta(viewRotation.current, ORIENTATION_ANGLE.negative));
          const snapped = toPositive <= toNegative ? ORIENTATION_ANGLE.positive : ORIENTATION_ANGLE.negative;
          viewRotation.current = snapped;
          viewRotation.target = snapped;

          runtime.balanceReadbackEnabled = false;
          runtime.lastBalanceMeasureMs = 0;
          setBalance(0.5, false);

          if (drag.active) {
            endDrag();
          }
          if (balanceState.dragging) {
            endBalanceDrag();
          }

          requestDraw();
          setSaveStatus("Reset");
        }

        function loadImage(src) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
          });
        }

        async function drawCurrentSvgToCanvas(ctx, x, y, w, h) {
          const clone = svg.cloneNode(true);
          clone.setAttribute("xmlns", SVG_NS);
          clone.setAttribute("width", String(VIEWBOX_SIZE));
          clone.setAttribute("height", String(VIEWBOX_SIZE));
          const svgText = new XMLSerializer().serializeToString(clone);
          const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          try {
            const img = await loadImage(url);
            ctx.drawImage(img, x, y, w, h);
          } finally {
            URL.revokeObjectURL(url);
          }
        }

        function canvasToBlob(canvasNode) {
          return new Promise((resolve, reject) => {
            if (typeof canvasNode.toBlob !== "function") {
              try {
                const dataUrl = canvasNode.toDataURL("image/png");
                fetch(dataUrl)
                  .then((response) => response.blob())
                  .then(resolve)
                  .catch(reject);
              } catch (error) {
                reject(error);
              }
              return;
            }
            canvasNode.toBlob((blob) => {
              if (!blob) {
                reject(new Error("Could not create image blob"));
                return;
              }
              resolve(blob);
            }, "image/png");
          });
        }

        function downloadBlob(blob, fileName) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.append(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
        }

        async function shareSnapshot(blob, fileName) {
          if (!("share" in navigator) || typeof File !== "function") return false;
          const file = new File([blob], fileName, { type: "image/png" });
          if ("canShare" in navigator && !navigator.canShare({ files: [file] })) return false;
          await navigator.share({ title: "Mood snapshot", files: [file] });
          return true;
        }

        function openBlobInNewTab(blob) {
          const url = URL.createObjectURL(blob);
          const opened = window.open(url, "_blank", "noopener,noreferrer");
          setTimeout(() => URL.revokeObjectURL(url), 6000);
          return Boolean(opened);
        }

        async function buildSnapshotCanvas(size = 1800) {
          draw();
          renderDateStamps();

          const snapshot = document.createElement("canvas");
          snapshot.width = size;
          snapshot.height = size;
          const sctx = snapshot.getContext("2d", { alpha: false });
          sctx.fillStyle = COLORS.bg;
          sctx.fillRect(0, 0, size, size);

          const symbolFrame = size * 0.8;
          const symbolX = (size - symbolFrame) * 0.5;
          const symbolY = (size - symbolFrame) * 0.5;
          await drawCurrentSvgToCanvas(sctx, symbolX, symbolY, symbolFrame, symbolFrame);

          const stamp = formatDisplayDate(new Date());
          const fontSize = Math.round(size * 0.05);
          const edgePadX = size * 0.055;
          const topPadY = size * 0.045;
          const bottomAnchorY = size * 0.965;

          sctx.font = `700 ${fontSize}px ${CONDENSED_FONT_STACK}`;
          sctx.textBaseline = "top";
          sctx.textAlign = "right";
          sctx.fillStyle = "#ffffff";
          sctx.fillText(stamp, size - edgePadX, topPadY);

          sctx.save();
          const stampWidth = sctx.measureText(stamp).width;
          sctx.translate(edgePadX + stampWidth, bottomAnchorY);
          sctx.rotate(Math.PI);
          sctx.textBaseline = "top";
          sctx.textAlign = "left";
          sctx.fillStyle = "#000000";
          sctx.fillText(stamp, 0, 0);
          sctx.restore();

          return snapshot;
        }

        async function captureMoodSymbol() {
          if (saveState.isSaving) return;
          saveState.isSaving = true;
          saveShotButton.disabled = true;
          saveShotButton.classList.add("is-saving");
          setSaveStatus("Saving...");

          try {
            const now = new Date();
            const fileStamp = formatFilenameStamp(now);
            const fileName = `Mood - ${fileStamp.date} - ${fileStamp.time}.png`;
            const snapshotCanvas = await buildSnapshotCanvas();
            const blob = await canvasToBlob(snapshotCanvas);

            if (isIOSLike) {
              try {
                const shared = await shareSnapshot(blob, fileName);
                if (shared) {
                  setSaveStatus("Shared mood snapshot");
                  return;
                }
              } catch (error) {
                if (error?.name === "AbortError") {
                  setSaveStatus("Share canceled");
                  return;
                }
              }

              const opened = openBlobInNewTab(blob);
              if (opened) {
                setSaveStatus("Opened snapshot tab");
                return;
              }
            }

            downloadBlob(blob, fileName);
            setSaveStatus("Saved mood snapshot");
          } catch (_) {
            setSaveStatus("Couldn’t save snapshot");
          } finally {
            saveShotButton.disabled = false;
            saveShotButton.classList.remove("is-saving");
            saveState.isSaving = false;
          }
        }

        function endDrag(e) {
          if (!drag.active) return;
          if (e && typeof e.pointerId === "number" && e.pointerId !== drag.pointerId) return;

          drag.active = false;
          if (
            drag.pointerId != null &&
            typeof svg.hasPointerCapture === "function" &&
            svg.hasPointerCapture(drag.pointerId)
          ) {
            try {
              svg.releasePointerCapture(drag.pointerId);
            } catch (_) {}
          }
          drag.pointerId = null;
          drag.pendingRotation = false;
        }

        svg.addEventListener("pointerdown", (e) => {
          const modelPoint = getModelPointFromEvent(e);
          if (!isInsideCircle(modelPoint)) return;

          const clamped = clampPointToCircle(modelPoint);
          const selectedSide = classifySideAtModelPoint(clamped);
          setViewRotationTargetForSide(selectedSide);

          const turnRequired = Math.abs(shortestAngleDelta(viewRotation.current, viewRotation.target));
          drag.pendingRotation = turnRequired > ROTATE_EPSILON;
          if (drag.pendingRotation) {
            requestDraw();
          }

          drag.active = true;
          drag.pointerId = e.pointerId;
          drag.start = clamped;
          drag.last = clamped;
          drag.distance = 0;

          svg.setPointerCapture(e.pointerId);
          requestDraw();
        });

        svg.addEventListener("pointermove", (e) => {
          if (!drag.active || e.pointerId !== drag.pointerId) return;

          const modelPoint = clampPointToCircle(getModelPointFromEvent(e));
          const turnRemaining = Math.abs(shortestAngleDelta(viewRotation.current, viewRotation.target));
          if (drag.pendingRotation) {
            drag.last = modelPoint;
            if (turnRemaining > ROTATE_EPSILON) {
              requestDraw();
              return;
            }
            drag.pendingRotation = false;
            drag.start = modelPoint;
            drag.last = modelPoint;
            drag.distance = 0;
            return;
          }

          const delta = {
            x: modelPoint.x - drag.last.x,
            y: modelPoint.y - drag.last.y,
          };
          const deltaMag = Math.hypot(delta.x, delta.y);
          if (deltaMag <= 1e-6) return;

          drag.distance += deltaMag;
          drag.last = modelPoint;

          if (drag.distance <= DRAG_ACTIVATE_VIEWBOX) {
            return;
          }

          const pullScale = Math.min(1, MAX_PULL_STEP / Math.max(1e-9, deltaMag));
          const pullDelta = {
            x: delta.x * pullScale,
            y: delta.y * pullScale,
          };

          runtime.balanceReadbackEnabled = true;
          applyFieldPull(modelPoint, pullDelta);
          requestDraw();
        });

        svg.addEventListener("pointerup", endDrag);
        svg.addEventListener("pointercancel", endDrag);
        svg.addEventListener("lostpointercapture", () => endDrag());
        window.addEventListener("blur", () => endDrag());

        function endBalanceDrag(e) {
          if (!balanceState.dragging) return;
          if (e && typeof e.pointerId === "number" && e.pointerId !== balanceState.pointerId) return;
          if (
            balanceTrack &&
            balanceState.pointerId != null &&
            typeof balanceTrack.hasPointerCapture === "function" &&
            balanceTrack.hasPointerCapture(balanceState.pointerId)
          ) {
            try {
              balanceTrack.releasePointerCapture(balanceState.pointerId);
            } catch (_) {}
          }
          balanceState.dragging = false;
          balanceState.pointerId = null;
          runtime.balanceReadbackEnabled = true;
          requestDraw();
        }

        if (balanceTrack) {
          balanceTrack.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            const value = getTrackValueFromPointerEvent(e);

            balanceState.dragging = true;
            balanceState.pointerId = e.pointerId;
            balanceTrack.setPointerCapture(e.pointerId);
            runtime.balanceReadbackEnabled = false;
            setBalance(value, true);
          });

          balanceTrack.addEventListener("pointermove", (e) => {
            if (!balanceState.dragging || e.pointerId !== balanceState.pointerId) return;
            setBalance(getTrackValueFromPointerEvent(e), true);
          });

          balanceTrack.addEventListener("pointerup", endBalanceDrag);
          balanceTrack.addEventListener("pointercancel", endBalanceDrag);
          balanceTrack.addEventListener("lostpointercapture", () => endBalanceDrag());
        }

        window.addEventListener(
          "resize",
          () => {
            requestDraw();
          },
          { passive: true }
        );

        saveShotButton.addEventListener("click", captureMoodSymbol);
        if (resetSymbolButton) {
          resetSymbolButton.addEventListener("click", resetSymbolState);
        }
        if (cycleColorsButton) {
          cycleColorsButton.addEventListener("click", () => {
            applyPalette(paletteIndex + 1, true);
          });
        }
        window.addEventListener("keydown", (event) => {
          if (event.code !== "Space" || event.repeat) return;
          const activeTag = (document.activeElement?.tagName || "").toLowerCase();
          if (activeTag === "input" || activeTag === "textarea" || activeTag === "select") return;
          event.preventDefault();
          captureMoodSymbol();
        });

        buildSvgScene();
        applyPalette(0, false);
        setBalance(0.5, false);
        requestDraw();
      })();
    </script>
  </body>
</html>
