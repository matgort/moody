          const slope = dividerSlopeFromPointsAtY(geometryState.dividerPoints, probeY, R);
          const bridgeAngle = Math.atan2(1, slope);
          // Eye paths are authored mostly vertical; rotate by delta from vertical.
          return clamp(bridgeAngle - Math.PI * 0.5, -0.75, 0.75);
        }

        function drawSourceSvgFeatures(geometryState, lineWidth) {
          if (!FACE_SOURCE_PATHS) return;

          const R = geometryState.R;
          const symbolScale = (2 * R) / FACE_SVG_VIEWBOX;

          const drawEyePathAtDot = (key, path, hostSide, fillColor) => {
            const dot = key === "top" ? geometryState.topEye : geometryState.bottomEye;
            if (!dot) return;

            const anchor = EYE_ANCHORS[key];
            const baseX = anchor.xNorm * R;
            const baseY = anchor.yNorm * R;
            const baseRadius = Math.max(R * anchor.radiusScale, 1.8 * getCanvasScale());
            const eyeScale = clamp(dot.r / Math.max(1e-6, baseRadius), 0.02, 1.3);
            const sideVisibleRatio =
              key === "top" ? geometryState.topVisibleRatio : geometryState.bottomVisibleRatio;
            if (sideVisibleRatio <= EYE_HIDE_AREA_THRESHOLD && dot.r <= Math.max(0.03, 0.04 * getCanvasScale())) {
              return;
            }

            const anchorSvgX = ((anchor.xNorm + 1) * 0.5) * FACE_SVG_VIEWBOX;
            const anchorSvgY = ((anchor.yNorm + 1) * 0.5) * FACE_SVG_VIEWBOX;
            const offsetX = dot.x - baseX;
            const offsetY = dot.y - baseY;
            const eyeRotation = getEyeBridgeRotation(key, dot, geometryState);

            ctx.save();
            clipHostRegion(hostSide, geometryState);
            ctx.translate(offsetX, offsetY);
            ctx.scale(symbolScale, symbolScale);
            ctx.translate(-FACE_SVG_VIEWBOX * 0.5, -FACE_SVG_VIEWBOX * 0.5);
            ctx.translate(anchorSvgX, anchorSvgY);
            ctx.rotate(eyeRotation);
            ctx.scale(eyeScale, eyeScale);
            ctx.translate(-anchorSvgX, -anchorSvgY);

            ctx.fillStyle = fillColor;
            ctx.fill(path);
            if (!LOOK_TEST.enabled || LOOK_TEST.drawEyeStroke) {
              ctx.strokeStyle = COLORS.line;
              ctx.lineWidth = lineWidth / Math.max(1e-6, symbolScale * eyeScale);
              ctx.lineJoin = "round";
              ctx.lineCap = "round";
              ctx.stroke(path);
            }
            ctx.restore();
          };

          drawEyePathAtDot("top", FACE_SOURCE_PATHS.eyeLeft, "white", COLORS.black);
          drawEyePathAtDot("bottom", FACE_SOURCE_PATHS.shared, "black", COLORS.white);
        }

        function geometry() {
          const R = getRadius();
          const dividerPoints = buildDivider(R);
          const featurePad = FEATURE_PADDING_CSS * getCanvasScale();
          const topVisibleRatio = getPositiveRatioFromGeometry({ R, dividerPoints });
          const bottomVisibleRatio = 1 - topVisibleRatio;

          const topAuto = findEyeAuto(
            R,
            "top",
            featurePad,
            dividerPoints
          );
          const bottomAuto = findEyeAuto(
            R,
            "bottom",
            featurePad,
            dividerPoints
          );

          const topPlaced = constrainEyeToBlob(
            topAuto.x,
            topAuto.y,
            R,
            topAuto.r,
            true,
            featurePad,
            dividerPoints
          );
          const bottomPlaced = constrainEyeToBlob(
            bottomAuto.x,
            bottomAuto.y,
            R,
            bottomAuto.r,
            false,
            featurePad,
            dividerPoints
          );

          let topTarget = topPlaced
            ? { x: topPlaced.x, y: topPlaced.y, r: topAuto.r }
            : { x: topAuto.x, y: topAuto.y, r: topAuto.r };
          let bottomTarget = bottomPlaced
            ? { x: bottomPlaced.x, y: bottomPlaced.y, r: bottomAuto.r }
            : { x: bottomAuto.x, y: bottomAuto.y, r: bottomAuto.r };

          // Load-layout correction only: blend eyes to desired neutral rest positions.
          const deformN = getGlobalDeformAmount();
          if (deformN < EYE_LOAD_BLEND_DEFORM) {
            const neutralT = clamp(1 - deformN / EYE_LOAD_BLEND_DEFORM, 0, 1);
            const topNeutral = constrainEyeToBlob(
              EYE_LOAD_TARGETS.top.xNorm * R,
              EYE_LOAD_TARGETS.top.yNorm * R,
              R,
              topTarget.r,
              true,
              featurePad,
              dividerPoints
            );
            const bottomNeutral = constrainEyeToBlob(
              EYE_LOAD_TARGETS.bottom.xNorm * R,
              EYE_LOAD_TARGETS.bottom.yNorm * R,
              R,
              bottomTarget.r,
              false,
              featurePad,
              dividerPoints
            );
            if (topNeutral) {
              topTarget.x = topTarget.x * (1 - neutralT) + topNeutral.x * neutralT;
              topTarget.y = topTarget.y * (1 - neutralT) + topNeutral.y * neutralT;
            }
            if (bottomNeutral) {
              bottomTarget.x = bottomTarget.x * (1 - neutralT) + bottomNeutral.x * neutralT;
              bottomTarget.y = bottomTarget.y * (1 - neutralT) + bottomNeutral.y * neutralT;
            }
          }

          const topRoom = getEyeRoomAt(topTarget.x, topTarget.y, R, true, featurePad, dividerPoints);
          const bottomRoom = getEyeRoomAt(
            bottomTarget.x,
            bottomTarget.y,
            R,
            false,
            featurePad,
            dividerPoints
          );

          const topBaseR = R * EYE_ANCHORS.top.radiusScale;
          const bottomBaseR = R * EYE_ANCHORS.bottom.radiusScale;
          if (topVisibleRatio > EYE_HIDE_AREA_THRESHOLD) {
            topTarget.r = clamp(topBaseR, R * 0.03, R * 0.26);
          } else {
            const topMax = Math.min(topRoom * 0.94, R * 0.26);
            topTarget.r =
              topMax > 0
                ? clamp(topBaseR, Math.min(R * 0.0018, topMax), topMax)
                : Math.max(0.06, R * 0.0014);
          }
          if (bottomVisibleRatio > EYE_HIDE_AREA_THRESHOLD) {
            bottomTarget.r = clamp(bottomBaseR, R * 0.03, R * 0.26);
          } else {
            const bottomMax = Math.min(bottomRoom * 0.94, R * 0.26);
            bottomTarget.r =
              bottomMax > 0
                ? clamp(bottomBaseR, Math.min(R * 0.0018, bottomMax), bottomMax)
                : Math.max(0.06, R * 0.0014);
          }

          topTarget = fitEyeInsideBlob(
            topTarget,
            R,
            true,
            featurePad,
            dividerPoints,
            topVisibleRatio
          );
          bottomTarget = fitEyeInsideBlob(
            bottomTarget,
            R,
            false,
            featurePad,
            dividerPoints,
            bottomVisibleRatio
          );

          const topEye = stabilizeEyeCenter(
            topTarget,
            "top",
            R,
            true,
            featurePad,
            dividerPoints,
            topVisibleRatio
          );
          const bottomEye = stabilizeEyeCenter(
            bottomTarget,
            "bottom",
            R,
            false,
            featurePad,
            dividerPoints,
            bottomVisibleRatio
          );

          return {
            R,
            dividerPoints,
            featurePad,
            topEye,
            bottomEye,
            topVisibleRatio,
            bottomVisibleRatio,
          };
        }

        function draw() {
          resizeCanvasToDisplaySize();
          const stillEasing = easeStateTowardTarget();
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const cx = canvas.width * 0.5;
          const cy = canvas.height * 0.5;
          const g = geometry();
          updateBalanceMeter(g);

          const lineWidth = Math.max(1.1, OUTLINE_WIDTH_CSS * getCanvasScale() * 0.75) + 2 * getCanvasScale();
          const outerLineWidth = lineWidth * OUTER_RING_WEIGHT;

          ctx.save();
          ctx.shadowColor = "rgba(0,0,0,0.26)";
          ctx.shadowBlur = Math.max(10, g.R * 0.08);
          ctx.shadowOffsetY = Math.max(6, g.R * 0.03);
          ctx.beginPath();
          ctx.arc(cx, cy, g.R, 0, TAU);
          ctx.fillStyle = "rgba(0,0,0,0)";
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(viewRotation.current);
          ctx.beginPath();
          ctx.arc(0, 0, g.R, 0, TAU);
          ctx.clip();

          ctx.fillStyle = COLORS.white;
          ctx.beginPath();
          ctx.arc(0, 0, g.R, 0, TAU);
          ctx.fill();

          ctx.fillStyle = COLORS.black;
          traceBlackRegionPath(g.dividerPoints, g.R);
          ctx.fill();

          if (!LOOK_TEST.enabled || LOOK_TEST.drawDividerStroke) {
            ctx.strokeStyle = COLORS.line;
            ctx.lineWidth = lineWidth;
            traceSmoothDivider(g.dividerPoints);
            ctx.stroke();
          }

          drawSourceSvgFeatures(g, lineWidth);

          ctx.restore();

          if (!LOOK_TEST.enabled || LOOK_TEST.drawOuterStroke) {
            ctx.beginPath();
            ctx.arc(cx, cy, g.R, 0, TAU);
            ctx.lineWidth = outerLineWidth;
            ctx.strokeStyle = COLORS.line;
            ctx.stroke();
          }

          if (stillEasing) requestDraw();
        }

        function buildSnapshotCanvas(size = 1800) {
          draw();
          renderDateStamps();

          const snapshot = document.createElement("canvas");
          snapshot.width = size;
          snapshot.height = size;
          const snapshotCtx = snapshot.getContext("2d", { alpha: false });

          snapshotCtx.fillStyle = COLORS.bg;
          snapshotCtx.fillRect(0, 0, size, size);

          const symbolFrame = size * 0.8;
          const symbolX = (size - symbolFrame) * 0.5;
          const symbolY = (size - symbolFrame) * 0.5;
          snapshotCtx.drawImage(canvas, symbolX, symbolY, symbolFrame, symbolFrame);

          const stamp = formatDisplayDate(new Date());
          const fontSize = Math.round(size * 0.05);
          const edgePadX = size * 0.055;
          const topPadY = size * 0.045;
          const bottomAnchorY = size * 0.965;

          snapshotCtx.font = `700 ${fontSize}px ${CONDENSED_FONT_STACK}`;
          snapshotCtx.textBaseline = "top";
          snapshotCtx.textAlign = "right";
          snapshotCtx.fillStyle = "#ffffff";
          snapshotCtx.fillText(stamp, size - edgePadX, topPadY);

          snapshotCtx.save();
          const stampWidth = snapshotCtx.measureText(stamp).width;
          snapshotCtx.translate(edgePadX + stampWidth, bottomAnchorY);
          snapshotCtx.rotate(Math.PI);
          snapshotCtx.textBaseline = "top";
          snapshotCtx.textAlign = "left";
          snapshotCtx.fillStyle = "#000000";
          snapshotCtx.fillText(stamp, 0, 0);
          snapshotCtx.restore();

          return snapshot;
        }

        function canvasToBlob(canvasNode) {
          return new Promise((resolve, reject) => {
            if (typeof canvasNode.toBlob !== "function") {
              try {
                const dataUrl = canvasNode.toDataURL("image/png");
                fetch(dataUrl)
                  .then((response) => response.blob())
                  .then(resolve)
                  .catch(reject);
                return;
              } catch (error) {
                reject(error);
                return;
              }
            }

            canvasNode.toBlob((blob) => {
              if (!blob) {
                reject(new Error("Could not create image blob"));
                return;
              }
              resolve(blob);
            }, "image/png");
          });
        }

        function downloadBlob(blob, fileName) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.append(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
        }

        async function shareSnapshot(blob, fileName) {
          if (!("share" in navigator) || typeof File !== "function") return false;
          const file = new File([blob], fileName, { type: "image/png" });
          if ("canShare" in navigator && !navigator.canShare({ files: [file] })) return false;
          await navigator.share({
            title: "Mood snapshot",
            files: [file],
          });
          return true;
        }

        function openBlobInNewTab(blob) {
          const url = URL.createObjectURL(blob);
          const opened = window.open(url, "_blank", "noopener,noreferrer");
          setTimeout(() => URL.revokeObjectURL(url), 6000);
          return Boolean(opened);
        }

        async function captureMoodSymbol() {
          if (saveState.isSaving) return;
          saveState.isSaving = true;
          saveShotButton.disabled = true;
          saveShotButton.classList.add("is-saving");
          setSaveStatus("Saving...");

          try {
            const now = new Date();
            const stamp = formatFilenameStamp(now);
            const fileName = `Mood - ${stamp.date} - ${stamp.time}.png`;
            const snapshotCanvas = buildSnapshotCanvas();
            const blob = await canvasToBlob(snapshotCanvas);

            if (isIOSLike) {
              try {
                const shared = await shareSnapshot(blob, fileName);
                if (shared) {
                  setSaveStatus("Shared mood snapshot");
                  return;
                }
              } catch (error) {
                if (error?.name === "AbortError") {
                  setSaveStatus("Share canceled");
                  return;
                }
              }

              const opened = openBlobInNewTab(blob);
              if (opened) {
                setSaveStatus("Opened snapshot tab");
                return;
              }
            }

            downloadBlob(blob, fileName);
            setSaveStatus("Saved mood snapshot");
          } catch (_) {
            setSaveStatus("Couldn’t save snapshot");
          } finally {
            saveShotButton.disabled = false;
            saveShotButton.classList.remove("is-saving");
            saveState.isSaving = false;
          }
        }

        function requestDraw() {
          if (requestDraw._raf) return;
          requestDraw._raf = requestAnimationFrame(() => {
            requestDraw._raf = 0;
            draw();
          });
        }

        canvas.addEventListener("pointerdown", (e) => {
          resizeCanvasToDisplaySize();
          let local = getLocalPoint(e);
          const g = geometry();
          if (!isInsideCircle(local.x, local.y, g.R)) return;
          const side = isWhiteAt(local.x, local.y, g.R, g.dividerPoints) ? "white" : "black";
          const desiredRotation = ORIENTATION_ANGLE[side];
          if (Math.abs(desiredRotation - viewRotation.current) > 1e-6) {
            viewRotation.current = desiredRotation;
            viewRotation.target = desiredRotation;
            local = getLocalPoint(e);
          }

          drag.active = true;
          drag.pointerId = e.pointerId;
          drag.start = local;
          drag.last = local;
          drag.startWhitePush = stateTarget.whitePush;
          drag.startBlackPush = stateTarget.blackPush;
          drag.startWhiteLift = stateTarget.whiteLift;
          drag.startBlackLift = stateTarget.blackLift;
          drag.startWhiteLocalShiftX = stateTarget.whiteLocalShiftX;
          drag.startBlackLocalShiftX = stateTarget.blackLocalShiftX;
          drag.startWhiteLocalShiftY = stateTarget.whiteLocalShiftY;
          drag.startBlackLocalShiftY = stateTarget.blackLocalShiftY;
          drag.startWhiteMouthWidth = stateTarget.whiteMouthWidth;
          drag.startBlackMouthWidth = stateTarget.blackMouthWidth;
          drag.startWhiteMouthHeight = stateTarget.whiteMouthHeight;
          drag.startBlackMouthHeight = stateTarget.blackMouthHeight;
          drag.startWhiteFocusY = stateTarget.whiteFocusY;
          drag.startBlackFocusY = stateTarget.blackFocusY;
          drag.mode = side;
          drag.eyeGrab = null;

          const eyeHitPad = EYE_DRAG_HIT_PAD_CSS * getCanvasScale();
          if (side === "white" && g.topEye) {
            const topDist = Math.hypot(local.x - g.topEye.x, local.y - g.topEye.y);
            if (topDist <= g.topEye.r + eyeHitPad) {
              drag.eyeGrab = "top";
            }
          } else if (side === "black" && g.bottomEye) {
            const bottomDist = Math.hypot(local.x - g.bottomEye.x, local.y - g.bottomEye.y);
            if (bottomDist <= g.bottomEye.r + eyeHitPad) {
              drag.eyeGrab = "bottom";
            }
          }

          drag.grabYNorm = clamp(
            drag.eyeGrab === "top"
              ? g.topEye.y / g.R
              : drag.eyeGrab === "bottom"
                ? g.bottomEye.y / g.R
                : local.y / g.R,
            -1,
            1
          );
          const dividerDistNorm =
            dividerNormalDistanceFromPoints(local.x, local.y, g.R, g.dividerPoints) /
            Math.max(1e-6, g.R);
          const dividerAffinity = 1 - smoothstep(0.14, 0.34, dividerDistNorm);
          drag.noseGrab = clamp(getNoseZoneAffinity(drag.grabYNorm) * dividerAffinity, 0, 1);
          drag.mouthGrab = clamp(getMouthZoneAffinity(drag.grabYNorm) * (0.35 + 0.65 * dividerAffinity), 0, 1);
          if (drag.eyeGrab) {
            // Eye drag should move the full facial mass around the eye anchor.
            drag.noseGrab = 1;
            drag.mouthGrab = 1;
          }

          const influence = getGrabInfluence(drag.grabYNorm);
          drag.topInfluence = influence.top;
          drag.bottomInfluence = influence.bottom;

          if (drag.mode === "white") {
            stateTarget.whiteFocusY = drag.grabYNorm;
            drag.startWhiteFocusY = stateTarget.whiteFocusY;
          } else {
            stateTarget.blackFocusY = drag.grabYNorm;
            drag.startBlackFocusY = stateTarget.blackFocusY;
          }

          canvas.setPointerCapture(e.pointerId);
          requestDraw();
        });

        canvas.addEventListener("pointermove", (e) => {
          if (!drag.active || e.pointerId !== drag.pointerId) return;
          resizeCanvasToDisplaySize();

          const local = getLocalPoint(e);
          const R = getRadius();
          const dx = local.x - drag.start.x;
          const dy = local.y - drag.start.y;

          const localHorizontal = dx / (0.82 * R);
          const localVertical = dy / (0.58 * R);
          const globalHorizontal = dx / (1.46 * R);
          const globalVertical = dy / (0.64 * R);
          const verticalRatioDrive = globalVertical * 0.2;
          const pointerYNorm = clamp(local.y / R, -1, 1);
          const noseGrab = drag.noseGrab;
          const mouthGrab = drag.mouthGrab;
          const featureGrab = Math.max(noseGrab, mouthGrab * 0.92);
          const sideLocalHorizontal = drag.mode === "white" ? localHorizontal : -localHorizontal;
          const sideGlobalHorizontal = drag.mode === "white" ? globalHorizontal : -globalHorizontal;
          const isEyeDrag = drag.eyeGrab != null;

          if (isEyeDrag) {
            const eyeFocusFollow = clamp(0.78 + 0.26 * featureGrab, 0.78, 1);

            if (drag.mode === "white") {
              stateTarget.whiteLocalShiftX = clamp(
                drag.startWhiteLocalShiftX + sideLocalHorizontal * 1.04,
                -1.8,
                1.8
              );
              stateTarget.whiteLocalShiftY = clamp(
                drag.startWhiteLocalShiftY + localVertical * 4.8,
                -2.8,
                2.8
              );
              stateTarget.whiteFocusY = clamp(
                drag.startWhiteFocusY * (1 - eyeFocusFollow) +
                  pointerYNorm * eyeFocusFollow +
                  localVertical * 0.42,
                -1.24,
                1.24
              );
              const eyeToFace = stateTarget.whiteFocusY - EYE_LOAD_TARGETS.top.yNorm;
              stateTarget.whiteMouthWidth = clamp(
                drag.startWhiteMouthWidth +
                  sideLocalHorizontal * 1.95 +
                  Math.abs(localVertical) * 0.42,
                -2.2,
                4.2
              );
              stateTarget.whiteMouthHeight = clamp(
                drag.startWhiteMouthHeight +
                  localVertical * 2.25 +
                  sideLocalHorizontal * 0.24 +
                  eyeToFace * 0.72,
                -2.4,
                4
              );
              stateTarget.whitePush = clampPush(
                drag.startWhitePush + sideGlobalHorizontal * (0.9 + 0.22 * drag.topInfluence)
              );
              stateTarget.blackPush = clampPush(
                drag.startBlackPush - sideGlobalHorizontal * (0.34 + 0.12 * drag.bottomInfluence)
              );
              stateTarget.whiteLift = clamp(
                drag.startWhiteLift + globalVertical * (2.05 + noseGrab * 0.5),
                -2.4,
                2.4
              );
              stateTarget.blackLift = clamp(
                drag.startBlackLift + globalVertical * 0.24,
                -2.2,
                2.2
              );
            } else {
              stateTarget.blackLocalShiftX = clamp(
                drag.startBlackLocalShiftX + sideLocalHorizontal * 1.04,
                -1.8,
                1.8
              );
              stateTarget.blackLocalShiftY = clamp(
                drag.startBlackLocalShiftY + localVertical * 4.8,
                -2.8,
                2.8
              );
              stateTarget.blackFocusY = clamp(
                drag.startBlackFocusY * (1 - eyeFocusFollow) +
                  pointerYNorm * eyeFocusFollow +
                  localVertical * 0.42,
                -1.24,
                1.24
              );
              const eyeToFace = EYE_LOAD_TARGETS.bottom.yNorm - stateTarget.blackFocusY;
              stateTarget.blackMouthWidth = clamp(
                drag.startBlackMouthWidth +
                  sideLocalHorizontal * 1.95 +
                  Math.abs(localVertical) * 0.42,
                -2.2,
                4.2
              );
              stateTarget.blackMouthHeight = clamp(
                drag.startBlackMouthHeight +
                  localVertical * 2.25 +
                  sideLocalHorizontal * 0.24 +
                  eyeToFace * 0.72,
                -2.4,
                4
              );
              stateTarget.blackPush = clampPush(
                drag.startBlackPush + sideGlobalHorizontal * (0.9 + 0.22 * drag.bottomInfluence)
              );
              stateTarget.whitePush = clampPush(
                drag.startWhitePush - sideGlobalHorizontal * (0.34 + 0.12 * drag.topInfluence)
              );
              stateTarget.blackLift = clamp(
                drag.startBlackLift + globalVertical * (2.05 + noseGrab * 0.5),
                -2.4,
                2.4
              );
              stateTarget.whiteLift = clamp(
                drag.startWhiteLift + globalVertical * 0.24,
                -2.2,
                2.2
              );
            }

            drag.last = local;
            requestDraw();
            return;
          }

          if (drag.mode === "white") {
            const topGain = 0.3 + 1.02 * drag.topInfluence;
            const bottomGain = 0.14 + 0.28 * drag.bottomInfluence;
            const yBlend = clamp(0.7 + 0.5 * drag.topInfluence + noseGrab * 1.25 + mouthGrab * 0.9, 0.7, 1.8);
            const focusFollow = clamp(0.44 + featureGrab * 0.5, 0.44, 0.96);
            const secondaryLift = clamp(0.1 + 0.22 * drag.bottomInfluence + featureGrab * 0.24, 0.1, 0.48);

            stateTarget.whiteLocalShiftX = clamp(
              drag.startWhiteLocalShiftX + localHorizontal * 0.92,
              -1.35,
              1.35
            );
            stateTarget.whiteLocalShiftY = clamp(
              drag.startWhiteLocalShiftY + localVertical * yBlend,
              -2.4,
              2.4
            );
            stateTarget.whiteMouthWidth = clamp(
              drag.startWhiteMouthWidth +
                (sideLocalHorizontal * 1.5 + sideGlobalHorizontal * 0.84 + localVertical * 0.16) *
                  mouthGrab,
              -2.4,
              3.8
            );
            stateTarget.whiteMouthHeight = clamp(
              drag.startWhiteMouthHeight +
                (localVertical * (1.3 + mouthGrab * 1.5) + sideLocalHorizontal * 0.26) * mouthGrab,
              -3.2,
              2.6
            );
            stateTarget.whiteFocusY = clamp(
              drag.startWhiteFocusY * (1 - focusFollow) +
                pointerYNorm * focusFollow +
                localVertical * (0.38 + featureGrab * 0.58),
              -1.24,
              1.24
            );

            stateTarget.whitePush = clampPush(
              drag.startWhitePush + globalHorizontal * topGain + verticalRatioDrive * 0.62
            );
            stateTarget.blackPush = clampPush(
              drag.startBlackPush -
                globalHorizontal * bottomGain * 0.42 -
                verticalRatioDrive * 0.58
            );

            stateTarget.whiteLift = clamp(
              drag.startWhiteLift +
                globalVertical * (1.1 + 0.58 * drag.topInfluence + noseGrab * 1.6 + mouthGrab * 0.44),
              -2.2,
              2.2
            );
            stateTarget.blackLift = clamp(
              drag.startBlackLift + globalVertical * secondaryLift,
              -2.2,
              2.2
            );
          } else {
            const bottomGain = 0.3 + 1.02 * drag.bottomInfluence;
            const topGain = 0.14 + 0.28 * drag.topInfluence;
            const yBlend = clamp(0.7 + 0.5 * drag.bottomInfluence + noseGrab * 1.25 + mouthGrab * 0.9, 0.7, 1.8);
            const focusFollow = clamp(0.44 + featureGrab * 0.5, 0.44, 0.96);
            const secondaryLift = clamp(0.1 + 0.22 * drag.topInfluence + featureGrab * 0.24, 0.1, 0.48);

            stateTarget.blackLocalShiftX = clamp(
              drag.startBlackLocalShiftX - localHorizontal * 0.92,
              -1.35,
              1.35
            );
            stateTarget.blackLocalShiftY = clamp(
              drag.startBlackLocalShiftY + localVertical * yBlend,
              -2.4,
              2.4
            );
            stateTarget.blackMouthWidth = clamp(
              drag.startBlackMouthWidth +
                (sideLocalHorizontal * 1.5 + sideGlobalHorizontal * 0.84 + localVertical * 0.16) *
                  mouthGrab,
              -2.4,
              3.8
            );
            stateTarget.blackMouthHeight = clamp(
              drag.startBlackMouthHeight +
                (localVertical * (1.3 + mouthGrab * 1.5) + sideLocalHorizontal * 0.26) * mouthGrab,
              -3.2,
              2.6
            );
            stateTarget.blackFocusY = clamp(
              drag.startBlackFocusY * (1 - focusFollow) +
                pointerYNorm * focusFollow +
                localVertical * (0.38 + featureGrab * 0.58),
              -1.24,
              1.24
            );

            stateTarget.blackPush = clampPush(
              drag.startBlackPush - globalHorizontal * bottomGain + verticalRatioDrive * 0.62
            );
            stateTarget.whitePush = clampPush(
              drag.startWhitePush + globalHorizontal * topGain * 0.42 + verticalRatioDrive * 0.58
            );

            stateTarget.blackLift = clamp(
              drag.startBlackLift +
                globalVertical * (1.1 + 0.58 * drag.bottomInfluence + noseGrab * 1.6 + mouthGrab * 0.44),
              -2.2,
              2.2
            );
            stateTarget.whiteLift = clamp(
              drag.startWhiteLift + globalVertical * secondaryLift,
              -2.2,
              2.2
            );
          }

          drag.last = local;
          requestDraw();
        });

        function endDrag(e) {
          if (!drag.active) return;
          if (e && typeof e.pointerId === "number" && e.pointerId !== drag.pointerId) return;
          drag.active = false;

          if (
            drag.pointerId != null &&
            typeof canvas.hasPointerCapture === "function" &&
            canvas.hasPointerCapture(drag.pointerId)
          ) {
            try {
              canvas.releasePointerCapture(drag.pointerId);
            } catch (_) {}
          }

          drag.pointerId = null;
          drag.mode = null;
          drag.eyeGrab = null;
          drag.noseGrab = 0;
          drag.mouthGrab = 0;
          requestDraw();
        }

        canvas.addEventListener("pointerup", endDrag);
        canvas.addEventListener("pointercancel", endDrag);
        canvas.addEventListener("lostpointercapture", () => endDrag());
        window.addEventListener("blur", () => {
          endDrag();
          endBalanceDrag();
        });

        function endBalanceDrag(e) {
          if (!balanceDrag.active) return;
          if (e && typeof e.pointerId === "number" && e.pointerId !== balanceDrag.pointerId) return;
          balanceDrag.active = false;
          if (
            balanceDrag.pointerId != null &&
            typeof balanceTrack.hasPointerCapture === "function" &&
            balanceTrack.hasPointerCapture(balanceDrag.pointerId)
          ) {
            try {
              balanceTrack.releasePointerCapture(balanceDrag.pointerId);
            } catch (_) {}
          }
          balanceDrag.pointerId = null;
        }

        balanceTrack.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const xNorm = getBalanceTrackXNorm(e);
          const splitNorm = 1 - balancePositiveRatio;
          const side = xNorm <= splitNorm ? "black" : "white";
          balanceDrag.active = true;
          balanceDrag.pointerId = e.pointerId;
          balanceDrag.side = side;
          setBalanceFromPositiveRatio(1 - xNorm, side);
          if (typeof balanceTrack.setPointerCapture === "function") {
            balanceTrack.setPointerCapture(e.pointerId);
          }
          requestDraw();
        });

        balanceTrack.addEventListener("pointermove", (e) => {
          if (!balanceDrag.active || e.pointerId !== balanceDrag.pointerId) return;
          const xNorm = getBalanceTrackXNorm(e);
          setBalanceFromPositiveRatio(1 - xNorm, balanceDrag.side);
          requestDraw();
        });

        balanceTrack.addEventListener("pointerup", endBalanceDrag);
        balanceTrack.addEventListener("pointercancel", endBalanceDrag);
        balanceTrack.addEventListener("lostpointercapture", () => endBalanceDrag());

        balanceTrack.addEventListener("keydown", (e) => {
          let nextPositive = balancePositiveRatio;
          if (e.code === "ArrowLeft") {
            nextPositive -= 0.01;
          } else if (e.code === "ArrowRight") {
            nextPositive += 0.01;
          } else if (e.code === "Home") {
            nextPositive = PUSH_MIN;
          } else if (e.code === "End") {
            nextPositive = PUSH_MAX;
          } else {
            return;
          }
          e.preventDefault();
          const side = nextPositive >= balancePositiveRatio ? "white" : "black";
          setBalanceFromPositiveRatio(nextPositive, side);
          requestDraw();
        });

        window.addEventListener("resize", requestDraw, { passive: true });
        saveShotButton.addEventListener("click", captureMoodSymbol);
        window.addEventListener("keydown", (event) => {
          if (event.code !== "Space" || event.repeat) return;
          const activeTag = (document.activeElement?.tagName || "").toLowerCase();
          if (activeTag === "input" || activeTag === "textarea" || activeTag === "select") return;
          event.preventDefault();
          captureMoodSymbol();
        });

        requestDraw();
      })();
    </script>
  </body>
</html>
